version: "3.9"

services:
  iods-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    volumes:
      - ./workspace:/app/workspace
      - ./reports:/app/reports
      - ./config:/app/config:ro
    environment:
      - IODS_DISABLE_ML=0
      - IODS_APP_PROFILE=production
      - IODS_MAX_EXTERNAL_PROCS=2
      - IODS_TOOL_EXECUTOR_THREADS=4
    command: uvicorn core.api.server:app --host 0.0.0.0 --port 8089 --workers 2
    restart: unless-stopped
