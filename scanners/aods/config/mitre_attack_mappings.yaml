# MITRE ATT&CK Mobile Techniques Database
mitre_techniques:
  T1575:  # Native Code
    name: "Native Code"
    tactic: "Execution"
    description: "Adversaries may directly interact with the native OS application programming interface (API) to execute behaviors."
    platforms: ["Android", "iOS"]
    data_sources: ["API monitoring", "System calls"]
    mitigations: 
      - "Application isolation"
      - "Code signing"
      - "Runtime application self-protection"
    detection_methods:
      - "Native API monitoring"
      - "Behavioral analysis"
      - "System call analysis"
    sub_techniques: []
    
  T1406:  # Obfuscated Files or Information
    name: "Obfuscated Files or Information"
    tactic: "Defense Evasion"
    description: "Adversaries may attempt to make an executable or file difficult to discover or analyze."
    platforms: ["Android", "iOS"]
    data_sources: ["File monitoring", "Process monitoring"]
    mitigations:
      - "Static analysis"
      - "Dynamic analysis"
      - "Code review"
    detection_methods:
      - "Entropy analysis"
      - "String analysis"
      - "Behavioral analysis"
    sub_techniques: []
    
  T1628:  # Hide Artifacts
    name: "Hide Artifacts"
    tactic: "Defense Evasion"
    description: "Adversaries may attempt to hide artifacts associated with their behaviors."
    platforms: ["Android", "iOS"]
    data_sources: ["File system monitoring", "Process monitoring"]
    mitigations:
      - "File integrity monitoring"
      - "Application sandboxing"
    detection_methods:
      - "File system analysis"
      - "Process tree analysis"
    sub_techniques: []
    
  T1533:  # Data from Local System
    name: "Data from Local System"
    tactic: "Collection"
    description: "Adversaries may search local system sources, such as file systems or local databases."
    platforms: ["Android", "iOS"]
    data_sources: ["File monitoring", "Process monitoring"]
    mitigations:
      - "Data encryption"
      - "Access controls"
      - "Application sandboxing"
    detection_methods:
      - "File access monitoring"
      - "Data flow analysis"
    sub_techniques: []
    
  T1411:  # Input Capture
    name: "Input Capture"
    tactic: "Credential Access"
    description: "Adversaries may use methods of capturing user input to obtain credentials."
    platforms: ["Android", "iOS"]
    data_sources: ["API monitoring", "Application logs"]
    mitigations:
      - "Input validation"
      - "Secure input methods"
      - "Multi-factor authentication"
    detection_methods:
      - "API call monitoring"
      - "Behavioral analysis"
    sub_techniques: []
    
  T1404:  # Exploitation for Privilege Escalation
    name: "Exploitation for Privilege Escalation"
    tactic: "Privilege Escalation"
    description: "Adversaries may exploit software vulnerabilities in an attempt to elevate privileges."
    platforms: ["Android", "iOS"]
    data_sources: ["System calls", "Process monitoring"]
    mitigations:
      - "Regular updates"
      - "Exploit mitigations"
      - "Principle of least privilege"
    detection_methods:
      - "Exploit detection"
      - "Privilege monitoring"
    sub_techniques: []
    
  T1437:  # Standard Application Layer Protocol
    name: "Standard Application Layer Protocol"
    tactic: "Command and Control"
    description: "Adversaries may communicate using application layer protocols."
    platforms: ["Android", "iOS"]
    data_sources: ["Network traffic", "Packet capture"]
    mitigations:
      - "Network monitoring"
      - "Traffic filtering"
      - "Certificate pinning"
    detection_methods:
      - "Protocol analysis"
      - "Traffic pattern analysis"
    sub_techniques: []

  # --- Mobile Malware-Specific Techniques ---

  T1516:  # Input Injection
    name: "Input Injection"
    tactic: "Defense Evasion"
    description: "Adversaries may inject input to the UI to perform actions, such as overlay attacks to steal credentials."
    platforms: ["Android"]
    data_sources: ["API monitoring", "Accessibility service monitoring"]
    mitigations:
      - "Overlay detection"
      - "Google Play Protect"
      - "User education"
    detection_methods:
      - "Overlay window monitoring"
      - "Accessibility service abuse detection"
    sub_techniques: []

  T1417:  # Input Capture
    name: "Input Capture"
    tactic: "Credential Access"
    description: "Adversaries may capture user input via keylogging or GUI input capture using accessibility services."
    platforms: ["Android", "iOS"]
    data_sources: ["API monitoring", "Accessibility events"]
    mitigations:
      - "Secure keyboard"
      - "Anti-keylogging"
      - "Accessibility service restrictions"
    detection_methods:
      - "Accessibility service monitoring"
      - "Input method monitoring"
    sub_techniques:
      - "T1417.001"  # Keylogging
      - "T1417.002"  # GUI Input Capture

  T1582:  # SMS Control
    name: "SMS Control"
    tactic: "Collection"
    description: "Adversaries may intercept, redirect, or block SMS messages to steal OTPs or prevent notifications."
    platforms: ["Android"]
    data_sources: ["SMS logs", "Broadcast receiver monitoring"]
    mitigations:
      - "App-based 2FA instead of SMS"
      - "SMS permission restrictions"
    detection_methods:
      - "SMS broadcast receiver monitoring"
      - "Default SMS app changes"
    sub_techniques: []

  T1624:  # Event Triggered Execution
    name: "Event Triggered Execution"
    tactic: "Persistence"
    description: "Adversaries may establish persistence through system event triggers such as accessibility services or broadcast receivers."
    platforms: ["Android"]
    data_sources: ["Accessibility service logs", "Broadcast receivers"]
    mitigations:
      - "Accessibility service audit"
      - "Boot receiver review"
    detection_methods:
      - "Service monitoring"
      - "Boot receiver analysis"
    sub_techniques:
      - "T1624.001"  # Broadcast Receivers

  T1402:  # Broadcast Receivers
    name: "Broadcast Receivers"
    tactic: "Persistence"
    description: "Adversaries may use broadcast receivers to execute code on boot or in response to system events."
    platforms: ["Android"]
    data_sources: ["Manifest analysis", "Runtime receiver registration"]
    mitigations:
      - "Manifest auditing"
      - "Permission review"
    detection_methods:
      - "Boot receiver enumeration"
      - "Dynamic receiver monitoring"
    sub_techniques: []

  T1429:  # Audio Capture
    name: "Audio Capture"
    tactic: "Collection"
    description: "Adversaries may capture audio from the device microphone for surveillance."
    platforms: ["Android", "iOS"]
    data_sources: ["Microphone API monitoring", "Permission usage"]
    mitigations:
      - "Microphone permission control"
      - "Hardware indicators"
    detection_methods:
      - "MediaRecorder/AudioRecord API monitoring"
      - "Background audio detection"
    sub_techniques: []

  T1512:  # Video Capture
    name: "Video Capture"
    tactic: "Collection"
    description: "Adversaries may capture video from the device camera or screen via MediaProjection."
    platforms: ["Android", "iOS"]
    data_sources: ["Camera API monitoring", "MediaProjection monitoring"]
    mitigations:
      - "Camera permission control"
      - "Hardware indicators"
    detection_methods:
      - "Camera/MediaProjection API monitoring"
      - "Screen recording detection"
    sub_techniques: []

  T1430:  # Location Tracking
    name: "Location Tracking"
    tactic: "Collection"
    description: "Adversaries may track device location using GPS, network, or passive providers."
    platforms: ["Android", "iOS"]
    data_sources: ["Location API monitoring", "Permission usage"]
    mitigations:
      - "Location permission control"
      - "Background location restrictions"
    detection_methods:
      - "LocationManager API monitoring"
      - "Background location requests"
    sub_techniques: []

  T1636:  # Protected User Data
    name: "Protected User Data"
    tactic: "Collection"
    description: "Adversaries may access protected user data such as contacts, SMS, and call logs."
    platforms: ["Android", "iOS"]
    data_sources: ["Content provider access", "Permission usage"]
    mitigations:
      - "Runtime permission control"
      - "Content provider restrictions"
    detection_methods:
      - "Content resolver monitoring"
      - "Permission grant tracking"
    sub_techniques:
      - "T1636.001"  # Contact List
      - "T1636.002"  # Call Log
      - "T1636.003"  # SMS Messages

  T1471:  # Data Encrypted for Impact
    name: "Data Encrypted for Impact"
    tactic: "Impact"
    description: "Adversaries may encrypt files on the device to extort payment (ransomware)."
    platforms: ["Android"]
    data_sources: ["File system monitoring", "Crypto API monitoring"]
    mitigations:
      - "Regular backups"
      - "Device admin restrictions"
    detection_methods:
      - "Mass file encryption detection"
      - "Cipher API monitoring"
    sub_techniques: []

  T1418:  # Software Discovery
    name: "Software Discovery"
    tactic: "Discovery"
    description: "Adversaries may query installed applications to identify banking/financial targets."
    platforms: ["Android", "iOS"]
    data_sources: ["Package manager queries", "API monitoring"]
    mitigations:
      - "Package visibility restrictions (Android 11+)"
    detection_methods:
      - "PackageManager query monitoring"
    sub_techniques: []

  T1496:  # Resource Hijacking
    name: "Resource Hijacking"
    tactic: "Impact"
    description: "Adversaries may use device CPU/GPU resources to mine cryptocurrency without user consent."
    platforms: ["Android", "iOS"]
    data_sources: ["CPU usage monitoring", "Network traffic", "Battery consumption"]
    mitigations:
      - "Performance monitoring"
      - "Battery usage alerts"
      - "Network traffic analysis"
    detection_methods:
      - "Sustained high CPU usage detection"
      - "Stratum protocol detection"
      - "Mining pool connection monitoring"
      - "WebView JavaScript mining detection"
    sub_techniques: []

