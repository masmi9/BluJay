# Configuration Validation Schema
validation:
  required_fields:
    cwe_mitre_mappings: ["techniques", "description", "confidence"]
    mitre_techniques: ["name", "tactic", "description", "platforms", "mitigations", "detection_methods"]
    threat_actors: ["actor_id", "name", "sophistication_level", "techniques_used"]
    threat_campaigns: ["campaign_id", "name", "techniques_used", "target_platforms"]
  
  confidence_range: [0.0, 1.0]
  
  valid_tactics:
    - "Initial Access"
    - "Execution"
    - "Persistence"
    - "Privilege Escalation"
    - "Defense Evasion"
    - "Credential Access"
    - "Discovery"
    - "Collection"
    - "Command and Control"
    - "Exfiltration"
    - "Impact"
  
  valid_platforms:
    - "Android"
    - "iOS"
    - "Cross-Platform"





