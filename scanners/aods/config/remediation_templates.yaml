      \    // This should be blocked by path validation\n                fileManager.getSecureFile(path, \"/app/uploads\"\
      );\n                fail(\"Malicious upload path should be blocked: \" + path);\n            } catch (SecurityException\
      \ e) {\n                // Expected behavior\n            }\n        }\n    }\n}"
