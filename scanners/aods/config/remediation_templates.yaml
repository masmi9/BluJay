insecure_deserialization_remediation:
  fix_summary: Implement secure deserialization practices and input validation to prevent unsafe object deserialization in
    {vuln_title}
  detailed_description: Insecure deserialization vulnerabilities (CWE-502) occur when applications deserialize untrusted data
    without proper validation, allowing attackers to execute arbitrary code, modify application logic, or perform denial of
    service attacks. This affects Java ObjectInputStream, .NET BinaryFormatter, JSON libraries like Gson/Jackson, XML deserializers,
    and custom serialization implementations. The fix involves implementing safe deserialization practices, input validation,
    type restrictions, and secure library alternatives.
  root_cause_analysis: Untrusted data is deserialized without proper validation, type checking, or security controls, allowing
    attackers to manipulate serialized objects to execute malicious code or alter application behavior through crafted payloads.
  steps:
  - step_number: 1
    title: Implement Safe Deserialization Libraries and Practices
    description: Replace unsafe deserialization methods with secure alternatives and implement proper type validation for
      all deserialization operations in {location}.
    code_example: "// Before (Vulnerable) - Unsafe deserialization\npublic class UnsafeDeserializer {\n    public Object deserializeFromStream(InputStream\
      \ input) {\n        try {\n            ObjectInputStream ois = new ObjectInputStream(input);  // VULNERABLE\n      \
      \      return ois.readObject();  // No type validation\n        } catch (Exception e) {\n            return null;\n\
      \        }\n    }\n    \n    public User deserializeUser(String jsonData) {\n        Gson gson = new Gson();\n     \
      \   return gson.fromJson(jsonData, Object.class);  // VULNERABLE - generic Object\n    }\n    \n    public Data deserializeXml(String\
      \ xmlData) {\n        XMLDecoder decoder = new XMLDecoder(new ByteArrayInputStream(xmlData.getBytes()));  // VULNERABLE\n\
      \        return (Data) decoder.readObject();\n    }\n}\n\n// After (Secure) - Safe deserialization with validation\n\
      public class SecureDeserializer {\n    private static final Set<String> ALLOWED_CLASSES = Set.of(\n        \"com.myapp.User\"\
      ,\n        \"com.myapp.Product\", \n        \"com.myapp.Order\",\n        \"java.lang.String\",\n        \"java.lang.Integer\"\
      ,\n        \"java.util.ArrayList\",\n        \"java.util.HashMap\"\n    );\n    \n    private static final int MAX_OBJECT_SIZE\
      \ = 1024 * 1024; // 1MB limit\n    \n    public <T> T deserializeFromStream(InputStream input, Class<T> expectedType)\
      \ {\n        // Step 1: Validate input size\n        if (!validateInputSize(input)) {\n            throw new SecurityException(\"\
      Input size exceeds maximum allowed\");\n        }\n        \n        // Step 2: Use secure ObjectInputStream with validation\n\
      \        try (ValidatingObjectInputStream vois = new ValidatingObjectInputStream(input)) {\n            // Configure\
      \ allowed classes\n            vois.accept(ALLOWED_CLASSES.toArray(new String[0]));\n            \n            // Set\
      \ size limits\n            vois.accept(Pattern.compile(\"java\\\\.lang\\\\..*\"));\n            vois.accept(Pattern.compile(\"\
      java\\\\.util\\\\..*\"));\n            \n            Object obj = vois.readObject();\n            \n            // Step\
      \ 3: Validate the deserialized type\n            if (!expectedType.isInstance(obj)) {\n                throw new SecurityException(\"\
      Deserialized object type mismatch: expected \" + \n                                          expectedType.getName()\
      \ + \" but got \" + obj.getClass().getName());\n            }\n            \n            return expectedType.cast(obj);\n\
      \        }\n    }\n    \n    public User deserializeUser(String jsonData) {\n        // Step 1: Input validation\n \
      \       if (jsonData == null || jsonData.trim().isEmpty()) {\n            throw new IllegalArgumentException(\"JSON\
      \ data cannot be null or empty\");\n        }\n        \n        if (jsonData.length() > MAX_OBJECT_SIZE) {\n      \
      \      throw new SecurityException(\"JSON data size exceeds limit\");\n        }\n        \n        // Step 2: Use secure\
      \ Gson configuration\n        Gson gson = createSecureGson();\n        \n        try {\n            // Step 3: Deserialize\
      \ with specific type (not Object.class)\n            User user = gson.fromJson(jsonData, User.class);\n            \n\
      \            // Step 4: Validate deserialized object\n            if (user != null) {\n                validateUserObject(user);\n\
      \            }\n            \n            return user;\n        } catch (JsonSyntaxException e) {\n            throw\
      \ new SecurityException(\"Invalid JSON format\", e);\n        }\n    }\n    \n    private Gson createSecureGson() {\n\
      \        return new GsonBuilder()\n            .disableHtmlEscaping()  // Prevent XSS in JSON strings\n            .setFieldNamingPolicy(FieldNamingPolicy.LOWER_CASE_WITH_UNDERSCORES)\n\
      \            .create();\n    }\n    \n    private void validateUserObject(User user) {\n        // Implement business\
      \ logic validation\n        if (user.getId() < 0) {\n            throw new SecurityException(\"Invalid user ID\");\n\
      \        }\n        \n        if (user.getEmail() != null && !isValidEmail(user.getEmail())) {\n            throw new\
      \ SecurityException(\"Invalid email format\");\n        }\n        \n        // Add more validation as needed\n    }\n\
      \    \n    public Data deserializeSecureXml(String xmlData) {\n        // Step 1: Input validation\n        if (xmlData\
      \ == null || xmlData.length() > MAX_OBJECT_SIZE) {\n            throw new SecurityException(\"Invalid XML input\");\n\
      \        }\n        \n        // Step 2: Use secure XML parser (avoid XMLDecoder)\n        try {\n            DocumentBuilderFactory\
      \ factory = DocumentBuilderFactory.newInstance();\n            \n            // Disable external entities to prevent\
      \ XXE\n            factory.setFeature(\"http://xml.org/sax/features/external-general-entities\", false);\n         \
      \   factory.setFeature(\"http://xml.org/sax/features/external-parameter-entities\", false);\n            factory.setFeature(\"\
      http://apache.org/xml/features/disallow-doctype-decl\", true);\n            \n            DocumentBuilder builder =\
      \ factory.newDocumentBuilder();\n            Document doc = builder.parse(new ByteArrayInputStream(xmlData.getBytes()));\n\
      \            \n            // Step 3: Manual parsing instead of automatic deserialization\n            return parseDataFromXmlDocument(doc);\n\
      \            \n        } catch (Exception e) {\n            throw new SecurityException(\"XML parsing failed\", e);\n\
      \        }\n    }\n    \n    private Data parseDataFromXmlDocument(Document doc) {\n        // Implement safe manual\
      \ XML parsing\n        Element root = doc.getDocumentElement();\n        Data data = new Data();\n        \n       \
      \ // Parse elements manually with validation\n        data.setId(parseIntegerElement(root, \"id\"));\n        data.setName(parseStringElement(root,\
      \ \"name\", 255)); // Max length\n        \n        return data;\n    }\n}\n\n// Secure ValidatingObjectInputStream\
      \ implementation\nclass ValidatingObjectInputStream extends ObjectInputStream {\n    private final Set<String> allowedClasses\
      \ = new HashSet<>();\n    private final Set<Pattern> allowedPatterns = new HashSet<>();\n    \n    public ValidatingObjectInputStream(InputStream\
      \ inputStream) throws IOException {\n        super(inputStream);\n    }\n    \n    public void accept(String className)\
      \ {\n        allowedClasses.add(className);\n    }\n    \n    public void accept(Pattern classPattern) {\n        allowedPatterns.add(classPattern);\n\
      \    }\n    \n    @Override\n    protected Class<?> resolveClass(ObjectStreamClass desc) throws IOException, ClassNotFoundException\
      \ {\n        String className = desc.getName();\n        \n        // Check against allowed classes\n        if (allowedClasses.contains(className))\
      \ {\n            return super.resolveClass(desc);\n        }\n        \n        // Check against allowed patterns\n\
      \        for (Pattern pattern : allowedPatterns) {\n            if (pattern.matcher(className).matches()) {\n      \
      \          return super.resolveClass(desc);\n            }\n        }\n        \n        throw new SecurityException(\"\
      Deserialization of class \" + className + \" is not allowed\");\n    }\n}"
