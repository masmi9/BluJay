      \           }\n        }\n    }\n    \n    @Test\n    public void testWhitelistDirectoryEnforcement() {\n        String[]\
      \ validPaths = {\n            \"document.txt\",\n            \"subfolder/file.pdf\",\n            \"images/photo.jpg\"\
      \n        };\n        \n        String[] invalidPaths = {\n            \"../outside.txt\",\n            \"/absolute/path.txt\"\
      , \n            \"..\\\\windows\\\\file.txt\"\n        };\n        \n        // Test valid paths are allowed\n     \
      \   for (String validPath : validPaths) {\n            try {\n                File result = fileManager.getSecureFile(validPath,\
      \ \"/test/base/path/documents\");\n                assertNotNull(\"Valid path should be allowed: \" + validPath, result);\n\
      \            } catch (SecurityException e) {\n                fail(\"Valid path should not be blocked: \" + validPath);\n\
      \            }\n        }\n        \n        // Test invalid paths are blocked\n        for (String invalidPath : invalidPaths)\
      \ {\n            try {\n                File result = fileManager.getSecureFile(invalidPath, \"/test/base/path/documents\"\
      );\n                fail(\"Invalid path should be blocked: \" + invalidPath);\n            } catch (SecurityException\
      \ e) {\n                // Expected\n                assertTrue(\"Should be blocked due to path traversal\", true);\n\
      \            }\n        }\n    }\n    \n    @Test\n    public void testCanonicalPathValidation() {\n        // Test\
      \ that canonical path validation works correctly\n        String basePath = \"/test/base/path\";\n        \n       \
      \ // Create test scenarios\n        Map<String, Boolean> pathTests = Map.of(\n            \"/test/base/path/file.txt\"\
      , true,           // Within bounds\n            \"/test/base/path/sub/file.txt\", true,       // Within bounds\n   \
      \         \"/test/base/file.txt\", false,               // Outside bounds\n            \"/test/other/path/file.txt\"\
      , false,         // Different path\n            \"/test/base/path/../file.txt\", false,       // Traversal attempt\n\
      \            \"/test/base/path/sub/../file.txt\", true     // Valid relative path\n        );\n        \n        for\
      \ (Map.Entry<String, Boolean> test : pathTests.entrySet()) {\n            String testPath = test.getKey();\n       \
      \     boolean shouldBeAllowed = test.getValue();\n            \n            File baseDir = new File(basePath);\n   \
      \         File testFile = new File(testPath);\n            \n            boolean isWithinBounds = isWithinBounds(testFile,\
      \ baseDir);\n            \n            assertEquals(\"Path validation failed for: \" + testPath, \n                \
      \        shouldBeAllowed, isWithinBounds);\n        }\n    }\n    \n    @Test\n    public void testFileExtensionValidation()\
      \ {\n        String[] allowedExtensions = {\".txt\", \".pdf\", \".jpg\", \".png\", \".doc\"};\n        String[] blockedExtensions\
      \ = {\".exe\", \".bat\", \".sh\", \".jar\", \".class\", \".key\"};\n        \n        FileAccessController controller\
      \ = new FileAccessController();\n        \n        for (String ext : allowedExtensions) {\n            File testFile\
