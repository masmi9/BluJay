  verification_checklist:
  - All unsafe deserialization methods replaced with secure alternatives
  - Input validation implemented for all serialized data types
  - Type restrictions and whitelisting enforced for object deserialization
  - Size limits and DoS protection implemented for all serialization formats
  - Platform-specific security measures implemented (Android Intent, .NET, etc.)
  - Data Transfer Objects (DTOs) used instead of direct domain object serialization
  - Message integrity verification implemented where applicable
  - Security testing framework validates all attack vectors
  - Performance requirements met for secure deserialization operations
  - Error handling prevents information disclosure through exception messages
  best_practices:
  - Use type-safe serialization formats like Protocol Buffers instead of binary serialization
  - Implement strict input validation and size limits for all serialized data
  - Use Data Transfer Objects (DTOs) to control what data is serialized/deserialized
  - Apply principle of least privilege - only deserialize necessary data types
  - Implement message signing and integrity verification for sensitive data
  - Use platform-specific secure serialization libraries when available
  - Regularly audit and update serialization security measures
  - Monitor deserialization operations for suspicious activity
  - Implement logging for deserialization security events
  - Use separate serialization contexts for trusted vs untrusted data sources
  prevention_measures:
  - Implement static analysis rules to detect unsafe deserialization patterns
  - Use secure coding guidelines for serialization operations
  - Regular penetration testing focusing on deserialization vulnerabilities
  - Implement runtime monitoring for deserialization attack attempts
  - Developer training on secure serialization practices
  - Code review requirements for all serialization-related changes
  - Use containerization and sandboxing to limit deserialization attack impact
  - Implement network-level filtering for serialized data transmission
  - Regular security audits of serialization libraries and dependencies
  - Use automated vulnerability scanning tools for serialization security
