    title: Implement Privacy Compliance and User Rights
    description: Add GDPR/CCPA compliance features including user consent, data portability, and right to be forgotten implementation.
    code_example: "// GDPR/CCPA Compliance Implementation\npublic class PrivacyComplianceManager {\n    \n    public static\
      \ class UserPrivacyRights {\n        // GDPR Right to Access (Article 15)\n        public JSONObject exportUserData(String\
      \ userId) {\n            JSONObject userData = new JSONObject();\n            \n            try {\n                //\
      \ Collect all user data from various sources\n                userData.put(\"user_id\", userId);\n                userData.put(\"\
      data_collected\", getUserDataSummary(userId));\n                userData.put(\"processing_purposes\", getProcessingPurposes(userId));\n\
      \                userData.put(\"data_recipients\", getDataRecipients(userId));\n                userData.put(\"retention_period\"\
      , \"14 months\");\n                userData.put(\"export_date\", new Date().toString());\n                \n       \
      \         // Include consent history\n                userData.put(\"consent_history\", getConsentHistory(userId));\n\
      \                \n            } catch (Exception e) {\n                Log.e(\"Privacy\", \"Failed to export user data\"\
      , e);\n            }\n            \n            return userData;\n        }\n        \n        // GDPR Right to Rectification\
      \ (Article 16)\n        public boolean updateUserData(String userId, Map<String, String> corrections) {\n          \
      \  try {\n                for (Map.Entry<String, String> correction : corrections.entrySet()) {\n                  \
      \  String field = correction.getKey();\n                    String newValue = correction.getValue();\n             \
      \       \n                    // Validate new value for PII\n                    PIIValidationResult validation = PIIProtectionManager.validateAndSanitize(newValue);\n\
      \                    \n                    // Update in secure storage\n                    updateUserField(userId,\
      \ field, validation.sanitizedData);\n                    \n                    // Log the rectification for audit\n\
      \                    logDataRectification(userId, field, \"Data updated by user request\");\n                }\n   \
      \             \n                return true;\n            } catch (Exception e) {\n                Log.e(\"Privacy\"\
      , \"Failed to update user data\", e);\n                return false;\n            }\n        }\n        \n        //\
      \ GDPR Right to Erasure/Right to be Forgotten (Article 17)\n        public boolean deleteUserData(String userId, String\
      \ reason) {\n            try {\n                // Delete from all storage locations\n                PrivacySecureStorage\
      \ storage = new PrivacySecureStorage(context);\n                storage.deleteUserData(userId);\n                \n\
      \                // Delete from analytics\n                PrivacyCompliantAnalytics analytics = new PrivacyCompliantAnalytics(context);\n\
      \                analytics.deleteUserData(userId);\n                \n                // Delete from database\n    \
      \            deleteFromDatabase(userId);\n                \n                // Delete from external services\n     \
      \           requestExternalDataDeletion(userId);\n                \n                // Log the deletion for compliance\
      \ audit\n                logDataDeletion(userId, reason);\n                \n                return true;\n        \
      \    } catch (Exception e) {\n                Log.e(\"Privacy\", \"Failed to delete user data\", e);\n             \
      \   return false;\n            }\n        }\n        \n        // GDPR Right to Data Portability (Article 20)\n    \
      \    public File exportUserDataPortable(String userId, String format) {\n            try {\n                JSONObject\
      \ userData = exportUserData(userId);\n                \n                File exportFile = new File(context.getExternalFilesDir(null),\
      \ \n                    \"user_data_export_\" + userId + \".\" + format.toLowerCase());\n                \n        \
      \        if (\"JSON\".equalsIgnoreCase(format)) {\n                    try (FileWriter writer = new FileWriter(exportFile))\
      \ {\n                        writer.write(userData.toString(2));\n                    }\n                } else if (\"\
      CSV\".equalsIgnoreCase(format)) {\n                    exportToCSV(userData, exportFile);\n                }\n     \
      \           \n                return exportFile;\n            } catch (Exception e) {\n                Log.e(\"Privacy\"\
      , \"Failed to create portable export\", e);\n                return null;\n            }\n        }\n        \n    \
      \    // Consent Management for Legal Basis\n        public void updateConsent(String userId, String consentType, boolean\
      \ granted) {\n            ConsentRecord record = new ConsentRecord(\n                userId, consentType, granted, new\
      \ Date(), \"user_action\"\n            );\n            \n            // Store consent record\n            storeConsentRecord(record);\n\
      \            \n            // Update processing based on consent\n            if (\"analytics\".equals(consentType))\
      \ {\n                PrivacyCompliantAnalytics analytics = new PrivacyCompliantAnalytics(context);\n               \
      \ if (granted) {\n                    analytics.enableAnalyticsWithConsent();\n                } else {\n          \
      \          analytics.disableAnalytics();\n                }\n            }\n        }\n        \n        private void\
      \ logDataRectification(String userId, String field, String reason) {\n            PrivacyAuditLog log = new PrivacyAuditLog(\n\
