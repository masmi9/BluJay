webview_security_remediation:
  fix_summary: Implement WebView security controls and secure JavaScript bridge configuration for {vuln_title}
  detailed_description: WebView security vulnerabilities occur when hybrid mobile applications fail to properly secure the
    bridge between native Android code and web content. This includes insecure JavaScript interface exposure, inadequate file
    access controls, missing Content Security Policy (CSP) implementation, and unsafe WebView configuration. The fix involves
    implementing secure WebView settings, JavaScript interface validation, CSP policies, and security controls
    for hybrid applications.
  root_cause_analysis: WebView components are configured with insecure default settings or exposed JavaScript bridges that
    allow untrusted web content to access native functionality without proper validation, authentication, or sandboxing controls.
  steps:
  - step_number: 1
    title: Implement Secure WebView Configuration and Settings
    description: Configure WebView with security-first settings, disable dangerous features, and implement proper access controls
      in {location}.
    code_example: "// Before (Vulnerable) - Insecure WebView configuration\npublic class VulnerableWebViewActivity extends\
      \ AppCompatActivity {\n    private WebView webView;\n    \n    @Override\n    protected void onCreate(Bundle savedInstanceState)\
      \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_webview);\n        \n   \
      \     webView = findViewById(R.id.webview);\n        WebSettings webSettings = webView.getSettings();\n        \n  \
      \      // VULNERABLE: Enabling dangerous settings\n        webSettings.setJavaScriptEnabled(true);  // JavaScript enabled\
      \ globally\n        webSettings.setAllowFileAccess(true);  // File access allowed\n        webSettings.setAllowFileAccessFromFileURLs(true);\
      \  // File URLs can access local files\n        webSettings.setAllowUniversalAccessFromFileURLs(true);  // Universal\
      \ access enabled\n        webSettings.setAllowContentAccess(true);  // Content provider access\n        webSettings.setDomStorageEnabled(true);\
      \  // DOM storage without restrictions\n        \n        // VULNERABLE: No security headers or CSP\n        webView.loadUrl(\"\
      https://untrusted-site.com/app\");\n        \n        // VULNERABLE: Insecure JavaScript interface\n        webView.addJavascriptInterface(new\
      \ UnsafeJSInterface(), \"AndroidInterface\");\n    }\n    \n    public class UnsafeJSInterface {\n        @JavascriptInterface\n\
      \        public String getDeviceInfo() {\n            return Build.MODEL + \" \" + Build.VERSION.RELEASE;  // Exposes\
      \ device info\n        }\n        \n        @JavascriptInterface\n        public void executeCommand(String command)\
      \ {\n            // VULNERABLE: Arbitrary command execution\n            Runtime.getRuntime().exec(command);\n     \
      \   }\n    }\n}\n\n// After (Secure) - Security-hardened WebView configuration\npublic class SecureWebViewActivity extends\
      \ AppCompatActivity {\n    private WebView webView;\n    private CSPManager cspManager;\n    private static final String[]\
      \ ALLOWED_DOMAINS = {\n        \"https://trusted-domain.com\",\n        \"https://app.company.com\"\n    };\n    \n\
      \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
      \        setContentView(R.layout.activity_webview);\n        \n        webView = findViewById(R.id.webview);\n     \
      \   cspManager = new CSPManager();\n        \n        // Configure secure WebView settings\n        configureSecureWebViewSettings();\n\
      \        \n        // Set up secure WebView client\n        webView.setWebViewClient(new SecureWebViewClient());\n \
      \       webView.setWebChromeClient(new SecureWebChromeClient());\n        \n        // Load trusted content only\n \
      \       loadTrustedContent(\"https://trusted-domain.com/app\");\n        \n        // Add secure JavaScript interface\n\
      \        webView.addJavascriptInterface(new SecureJSInterface(this), \"SecureInterface\");\n    }\n    \n    private\
      \ void configureSecureWebViewSettings() {\n        WebSettings webSettings = webView.getSettings();\n        \n    \
      \    // JavaScript control - only enable if absolutely necessary\n        webSettings.setJavaScriptEnabled(false); \
      \ // Disable by default\n        \n        // File access restrictions\n        webSettings.setAllowFileAccess(false);\
      \  // Disable file access\n        webSettings.setAllowFileAccessFromFileURLs(false);  // No file URL access\n     \
      \   webSettings.setAllowUniversalAccessFromFileURLs(false);  // No universal access\n        webSettings.setAllowContentAccess(false);\
      \  // No content provider access\n        \n        // Additional security settings\n        webSettings.setDatabaseEnabled(false);\
      \  // Disable database\n        webSettings.setDomStorageEnabled(false);  // Disable DOM storage\n        webSettings.setGeolocationEnabled(false);\
      \  // Disable geolocation\n        webSettings.setMediaPlaybackRequiresUserGesture(true);  // Require user interaction\n\
      \        \n        // Network and caching security\n        webSettings.setCacheMode(WebSettings.LOAD_NO_CACHE);  //\
      \ Disable caching\n        webSettings.setMixedContentMode(WebSettings.MIXED_CONTENT_NEVER_ALLOW);  // Block mixed content\n\
      \        \n        // User agent customization (avoid fingerprinting)\n        webSettings.setUserAgentString(\"SecureApp/1.0\"\
      );\n    }\n    \n    private void loadTrustedContent(String url) {\n        if (isAllowedDomain(url)) {\n          \
      \  // Add CSP headers\n            Map<String, String> headers = cspManager.getCSPHeaders();\n            webView.loadUrl(url,\
      \ headers);\n        } else {\n            Log.w(\"WebView\", \"Blocked untrusted domain: \" + url);\n            loadErrorPage(\"\
      Domain not allowed\");\n        }\n    }\n    \n    private boolean isAllowedDomain(String url) {\n        for (String\
      \ allowedDomain : ALLOWED_DOMAINS) {\n            if (url.startsWith(allowedDomain)) {\n                return true;\n\
      \            }\n        }\n        return false;\n    }\n}"
