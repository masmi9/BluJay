      \ detected\");\n            }\n        }\n        \n        private boolean isSecureTLSVersion(String version) {\n \
      \           return \"TLSv1.2\".equals(version) || \"TLSv1.3\".equals(version);\n        }\n        \n        private\
      \ boolean areCryptographicStandardsCurrent(NetworkSecurityConfiguration config) {\n            // Check if using current\
      \ cryptographic standards\n            return config.getMinTlsVersion().equals(\"TLSv1.3\") || config.getMinTlsVersion().equals(\"\
