  - step_number: 2
    title: Implement Input validation for Serialized Data
    description: Add input validation, size limits, and content scanning for all serialized data before deserialization.
    code_example: "// Input validation framework for serialized data\npublic class SerializedDataValidator {\n\
      \    private static final int MAX_SERIALIZED_SIZE = 2 * 1024 * 1024; // 2MB\n    private static final int MAX_NESTING_DEPTH\
      \ = 50;\n    private static final Set<String> DANGEROUS_PATTERNS = Set.of(\n        \"java.lang.Runtime\",\n       \
      \ \"java.lang.ProcessBuilder\",\n        \"java.io.File\",\n        \"java.lang.reflect\",\n        \"sun.reflect\"\
      ,\n        \"com.sun.rowset.JdbcRowSetImpl\",\n        \"javax.script.ScriptEngine\",\n        \"org.apache.commons.collections.functors\"\
      ,\n        \"org.springframework.beans.factory\"\n    );\n    \n    public ValidationResult validateSerializedData(byte[]\
      \ data, String contentType) {\n        ValidationResult result = new ValidationResult();\n        \n        try {\n\
      \            // Step 1: Size validation\n            if (!validateSize(data, result)) {\n                return result;\n\
      \            }\n            \n            // Step 2: Content-type specific validation\n            switch (contentType.toLowerCase())\
      \ {\n                case \"application/java-serialized\":\n                    validateJavaSerialization(data, result);\n\
      \                    break;\n                case \"application/json\":\n                    validateJsonData(new String(data),\
      \ result);\n                    break;\n                case \"application/xml\":\n                    validateXmlData(new\
      \ String(data), result);\n                    break;\n                case \"application/x-protobuf\":\n           \
      \         validateProtobufData(data, result);\n                    break;\n                default:\n              \
      \      result.addError(\"Unsupported content type: \" + contentType);\n            }\n            \n            // Step\
      \ 3: Pattern-based security scanning\n            if (result.isValid()) {\n                performSecurityScanning(data,\
      \ result);\n            }\n            \n        } catch (Exception e) {\n            result.addError(\"Validation failed:\
      \ \" + e.getMessage());\n        }\n        \n        return result;\n    }\n    \n    private boolean validateSize(byte[]\
      \ data, ValidationResult result) {\n        if (data == null) {\n            result.addError(\"Serialized data is null\"\
      );\n            return false;\n        }\n        \n        if (data.length == 0) {\n            result.addError(\"\
      Serialized data is empty\");\n            return false;\n        }\n        \n        if (data.length > MAX_SERIALIZED_SIZE)\
      \ {\n            result.addError(\"Serialized data size (\" + data.length + \n                           \" bytes) exceeds\
      \ maximum allowed (\" + MAX_SERIALIZED_SIZE + \" bytes)\");\n            return false;\n        }\n        \n      \
      \  return true;\n    }\n    \n    private void validateJavaSerialization(byte[] data, ValidationResult result) {\n \
      \       // Check Java serialization magic number\n        if (data.length < 4 || \n            (data[0] & 0xFF) != 0xAC\
      \ || (data[1] & 0xFF) != 0xED ||\n            (data[2] & 0xFF) != 0x00 || (data[3] & 0xFF) != 0x05) {\n            result.addError(\"\
      Invalid Java serialization magic number\");\n            return;\n        }\n        \n        // Perform deep structure\
      \ analysis\n        try (ByteArrayInputStream bais = new ByteArrayInputStream(data);\n             ObjectInputStream\
      \ ois = new SafeAnalysisObjectInputStream(bais)) {\n            \n            analyzeSerializationStructure(ois, result,\
      \ 0);\n            \n        } catch (Exception e) {\n            result.addError(\"Java serialization structure analysis\
      \ failed: \" + e.getMessage());\n        }\n    }\n    \n    private void validateJsonData(String jsonData, ValidationResult\
      \ result) {\n        try {\n            // Parse JSON to check structure\n            JsonParser parser = JsonParser.parseString(jsonData);\n\
      \            \n            // Analyze JSON structure for security issues\n            analyzeJsonStructure(parser, result,\
      \ 0);\n            \n        } catch (JsonSyntaxException e) {\n            result.addError(\"Invalid JSON syntax: \"\
      \ + e.getMessage());\n        }\n    }\n    \n    private void analyzeJsonStructure(JsonElement element, ValidationResult\
      \ result, int depth) {\n        if (depth > MAX_NESTING_DEPTH) {\n            result.addError(\"JSON nesting depth exceeds\
      \ maximum allowed (\" + MAX_NESTING_DEPTH + \")\");\n            return;\n        }\n        \n        if (element.isJsonObject())\
      \ {\n            JsonObject obj = element.getAsJsonObject();\n            \n            // Check for dangerous properties\n\
      \            for (String key : obj.keySet()) {\n                if (isDangerousProperty(key)) {\n                  \
      \  result.addError(\"Dangerous JSON property detected: \" + key);\n                    return;\n                }\n\
      \                \n                analyzeJsonStructure(obj.get(key), result, depth + 1);\n            }\n        }\
      \ else if (element.isJsonArray()) {\n            JsonArray array = element.getAsJsonArray();\n            \n       \
      \     if (array.size() > 10000) {  // Prevent array DoS\n                result.addError(\"JSON array size exceeds maximum\
      \ allowed\");\n                return;\n            }\n            \n            for (JsonElement arrayElement : array)\
      \ {\n                analyzeJsonStructure(arrayElement, result, depth + 1);\n            }\n        }\n    }\n    \n\
      \    private boolean isDangerousProperty(String propertyName) {\n        Set<String> dangerousProperties = Set.of(\n\
      \            \"@class\", \"@type\", \"class\", \"type\", \n            \"javaClass\", \"className\", \"objectClass\"\
      ,\n            \"__proto__\", \"constructor\", \"prototype\"\n        );\n        \n        return dangerousProperties.contains(propertyName.toLowerCase());\n\
      \    }\n    \n    private void performSecurityScanning(byte[] data, ValidationResult result) {\n        String dataString\
      \ = new String(data, StandardCharsets.UTF_8);\n        \n        // Scan for dangerous class patterns\n        for (String\
      \ dangerousPattern : DANGEROUS_PATTERNS) {\n            if (dataString.contains(dangerousPattern)) {\n             \
      \   result.addError(\"Dangerous class pattern detected: \" + dangerousPattern);\n                return;\n         \
      \   }\n        }\n        \n        // Scan for suspicious method calls\n        Set<String> suspiciousMethods = Set.of(\n\
      \            \"Runtime.getRuntime\", \"ProcessBuilder\", \"System.exit\",\n            \"File.delete\", \"File.createTempFile\"\
      , \"Class.forName\",\n            \"Method.invoke\", \"Field.set\", \"Constructor.newInstance\"\n        );\n      \
      \  \n        for (String method : suspiciousMethods) {\n            if (dataString.contains(method)) {\n           \
      \     result.addWarning(\"Suspicious method detected: \" + method);\n            }\n        }\n    }\n}\n\n// Validation\
      \ result class\npublic class ValidationResult {\n    private final List<String> errors = new ArrayList<>();\n    private\
      \ final List<String> warnings = new ArrayList<>();\n    private boolean valid = true;\n    \n    public void addError(String\
      \ error) {\n        errors.add(error);\n        valid = false;\n    }\n    \n    public void addWarning(String warning)\
      \ {\n        warnings.add(warning);\n    }\n    \n    public boolean isValid() {\n        return valid;\n    }\n   \
      \ \n    public List<String> getErrors() {\n        return Collections.unmodifiableList(errors);\n    }\n    \n    public\
      \ List<String> getWarnings() {\n        return Collections.unmodifiableList(warnings);\n    }\n}\n\n// Safe analysis\
      \ ObjectInputStream (read-only)\nclass SafeAnalysisObjectInputStream extends ObjectInputStream {\n    public SafeAnalysisObjectInputStream(InputStream\
      \ inputStream) throws IOException {\n        super(inputStream);\n    }\n    \n    @Override\n    protected Object readObjectOverride()\
      \ throws IOException, ClassNotFoundException {\n        // Don't actually deserialize, just analyze structure\n    \
      \    throw new UnsupportedOperationException(\"This stream is for analysis only\");\n    }\n}"
