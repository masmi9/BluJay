      \ FileAccessController();\n        accessController.grantPermission(\"testuser\", \"/test/base/path\", FilePermission.READ);\n\
      \    }\n    \n    @Test\n    public void testPathTraversalAttackVectors() {\n        // Test various path traversal\
      \ attack patterns\n        String[] traversalPayloads = {\n            \"../../../etc/passwd\",\n            \"..\\\\\
      ..\\\\..\\\\windows\\\\system32\\\\config\\\\sam\",\n            \"%2e%2e%2f%2e%2e%2f%2e%2e%2fetc%2fpasswd\",\n    \
      \        \"..%252f..%252f..%252fetc%252fpasswd\",\n            \"..%c0%af..%c0%af..%c0%afetc%c0%afpasswd\",\n      \
