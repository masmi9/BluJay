  - step_number: 2
    title: Implement Secure Network Protocol Configuration
    description: Configure secure TLS protocols, cipher suites, and connection specifications to prevent protocol downgrade
      attacks.
    code_example: "// Secure Network Protocol Configuration Implementation\npublic class SecureNetworkProtocolManager {\n\
      \    private static final String TAG = \"SecureNetworkProtocol\";\n    \n    // Secure TLS versions - only modern protocols\n\
      \    private static final TlsVersion[] SECURE_TLS_VERSIONS = {\n        TlsVersion.TLS_1_3,  // Preferred\n        TlsVersion.TLS_1_2\
      \   // Minimum acceptable\n    };\n    \n    // Secure cipher suites - AEAD ciphers with perfect forward secrecy\n \
      \   private static final CipherSuite[] SECURE_CIPHER_SUITES = {\n        // TLS 1.3 cipher suites\n        CipherSuite.TLS_AES_256_GCM_SHA384,\n\
      \        CipherSuite.TLS_AES_128_GCM_SHA256,\n        CipherSuite.TLS_CHACHA20_POLY1305_SHA256,\n        \n        //\
      \ TLS 1.2 secure cipher suites with PFS\n        CipherSuite.TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,\n        CipherSuite.TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,\n\
      \        CipherSuite.TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256,\n        CipherSuite.TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,\n\
      \        CipherSuite.TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,\n        CipherSuite.TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256\n\
      \    };\n    \n    // Blocked insecure cipher suites and protocols\n    private static final Set<String> BLOCKED_CIPHER_SUITES\
      \ = Set.of(\n        \"TLS_RSA_\", // No forward secrecy\n        \"TLS_DHE_DSS_\", // Weak DSS\n        \"TLS_DH_anon\"\
      , // Anonymous DH\n        \"TLS_ECDH_anon\", // Anonymous ECDH\n        \"SSL_\", // All SSL protocols\n        \"\
      TLS_NULL_\", // Null encryption\n        \"TLS_EMPTY_RENEGOTIATION_INFO_SCSV\"\n    );\n    \n    private static final\
      \ Set<String> BLOCKED_TLS_VERSIONS = Set.of(\n        \"SSLv2\", \"SSLv3\", \"TLSv1\", \"TLSv1.1\"\n    );\n    \n \
      \   public static ConnectionSpec createSecureConnectionSpec() {\n        return new ConnectionSpec.Builder(ConnectionSpec.MODERN_TLS)\n\
      \            .tlsVersions(SECURE_TLS_VERSIONS)\n            .cipherSuites(SECURE_CIPHER_SUITES)\n            .supportsTlsExtensions(true)\n\
      \            .build();\n    }\n    \n    public static OkHttpClient.Builder configureSecureProtocols(OkHttpClient.Builder\
      \ builder) {\n        // Configure secure connection specifications\n        List<ConnectionSpec> connectionSpecs =\
      \ Arrays.asList(\n            createSecureConnectionSpec(),\n            ConnectionSpec.CLEARTEXT // Only for HTTP (non-secure)\
      \ fallback if absolutely necessary\n        );\n        \n        builder.connectionSpecs(connectionSpecs);\n      \
      \  \n        // Configure secure protocols\n        builder.protocols(Arrays.asList(Protocol.HTTP_2, Protocol.HTTP_1_1));\n\
      \        \n        // Add security validation interceptor\n        builder.addInterceptor(new ProtocolSecurityInterceptor());\n\
      \        \n        return builder;\n    }\n    \n    // Security validation interceptor\n    private static class ProtocolSecurityInterceptor\
      \ implements Interceptor {\n        @Override\n        public Response intercept(Chain chain) throws IOException {\n\
      \            Request request = chain.request();\n            \n            // Validate request URL uses HTTPS\n    \
      \        if (!request.url().isHttps()) {\n                throw new IOException(\"Insecure HTTP connections not allowed:\
      \ \" + request.url());\n            }\n            \n            Response response = chain.proceed(request);\n     \
      \       \n            // Validate response protocol security\n            validateResponseSecurity(response);\n    \
      \        \n            return response;\n        }\n        \n        private void validateResponseSecurity(Response\
      \ response) throws IOException {\n            Handshake handshake = response.handshake();\n            if (handshake\
      \ == null) {\n                throw new IOException(\"No TLS handshake information available\");\n            }\n  \
      \          \n            // Validate TLS version\n            TlsVersion tlsVersion = handshake.tlsVersion();\n    \
      \        if (!Arrays.asList(SECURE_TLS_VERSIONS).contains(tlsVersion)) {\n                throw new IOException(\"Insecure\
      \ TLS version: \" + tlsVersion);\n            }\n            \n            // Validate cipher suite\n            CipherSuite\
      \ cipherSuite = handshake.cipherSuite();\n            String cipherSuiteName = cipherSuite.javaName();\n           \
      \ \n            for (String blockedPrefix : BLOCKED_CIPHER_SUITES) {\n                if (cipherSuiteName.startsWith(blockedPrefix))\
      \ {\n                    throw new IOException(\"Insecure cipher suite: \" + cipherSuiteName);\n                }\n\
      \            }\n            \n            Log.d(TAG, \"Secure connection established - TLS: \" + tlsVersion + \", Cipher:\
      \ \" + cipherSuiteName);\n        }\n    }\n    \n    // HttpsURLConnection configuration for secure protocols\n   \
      \ public static class SecureHttpsConnection {\n        public static HttpsURLConnection createSecureConnection(URL url)\
      \ throws IOException {\n            if (!\"https\".equals(url.getProtocol())) {\n                throw new IOException(\"\
      Only HTTPS connections allowed\");\n            }\n            \n            HttpsURLConnection connection = (HttpsURLConnection)\
      \ url.openConnection();\n            \n            try {\n                // Configure secure SSL context\n        \
      \        SSLContext sslContext = SSLContext.getInstance(\"TLSv1.3\");\n                sslContext.init(null, null, new\
      \ SecureRandom());\n                \n                connection.setSSLSocketFactory(new SecureSSLSocketFactory(sslContext.getSocketFactory()));\n\
      \                connection.setHostnameVerifier(new SecureHostnameVerifier());\n                \n                //\
      \ Configure secure connection properties\n                connection.setConnectTimeout(30000);\n                connection.setReadTimeout(30000);\n\
      \                connection.setUseCaches(false);\n                connection.setInstanceFollowRedirects(false); // Handle\
      \ redirects manually\n                \n                // Add security headers\n                connection.setRequestProperty(\"\
      User-Agent\", \"SecureApp/1.0\");\n                connection.setRequestProperty(\"Cache-Control\", \"no-cache\");\n\
      \                \n                return connection;\n                \n            } catch (Exception e) {\n     \
      \           throw new IOException(\"Failed to configure secure connection\", e);\n            }\n        }\n    }\n\
      \    \n    // Secure SSL socket factory wrapper\n    private static class SecureSSLSocketFactory extends SSLSocketFactory\
      \ {\n        private final SSLSocketFactory delegate;\n        \n        public SecureSSLSocketFactory(SSLSocketFactory\
      \ delegate) {\n            this.delegate = delegate;\n        }\n        \n        @Override\n        public Socket\
      \ createSocket() throws IOException {\n            return configureSecureSocket((SSLSocket) delegate.createSocket());\n\
      \        }\n        \n        @Override\n        public Socket createSocket(String host, int port) throws IOException\
      \ {\n            return configureSecureSocket((SSLSocket) delegate.createSocket(host, port));\n        }\n        \n\
      \        @Override\n        public Socket createSocket(String host, int port, InetAddress localHost, int localPort)\
      \ throws IOException {\n            return configureSecureSocket((SSLSocket) delegate.createSocket(host, port, localHost,\
      \ localPort));\n        }\n        \n        @Override\n        public Socket createSocket(InetAddress host, int port)\
      \ throws IOException {\n            return configureSecureSocket((SSLSocket) delegate.createSocket(host, port));\n \
      \       }\n        \n        @Override\n        public Socket createSocket(InetAddress address, int port, InetAddress\
      \ localAddress, int localPort) throws IOException {\n            return configureSecureSocket((SSLSocket) delegate.createSocket(address,\
      \ port, localAddress, localPort));\n        }\n        \n        @Override\n        public Socket createSocket(Socket\
      \ s, String host, int port, boolean autoClose) throws IOException {\n            return configureSecureSocket((SSLSocket)\
      \ delegate.createSocket(s, host, port, autoClose));\n        }\n        \n        @Override\n        public String[]\
      \ getDefaultCipherSuites() {\n            return filterSecureCipherSuites(delegate.getDefaultCipherSuites());\n    \
      \    }\n        \n        @Override\n        public String[] getSupportedCipherSuites() {\n            return filterSecureCipherSuites(delegate.getSupportedCipherSuites());\n\
      \        }\n        \n        private SSLSocket configureSecureSocket(SSLSocket socket) {\n            // Configure\
      \ secure protocols\n            String[] supportedProtocols = socket.getSupportedProtocols();\n            List<String>\
      \ secureProtocols = new ArrayList<>();\n            \n            for (String protocol : supportedProtocols) {\n   \
      \             if (!BLOCKED_TLS_VERSIONS.contains(protocol)) {\n                    secureProtocols.add(protocol);\n\
      \                }\n            }\n            \n            socket.setEnabledProtocols(secureProtocols.toArray(new\
      \ String[0]));\n            \n            // Configure secure cipher suites\n            socket.setEnabledCipherSuites(filterSecureCipherSuites(socket.getSupportedCipherSuites()));\n\
      \            \n            return socket;\n        }\n        \n        private String[] filterSecureCipherSuites(String[]\
      \ cipherSuites) {\n            List<String> secureCipherSuites = new ArrayList<>();\n            \n            for (String\
      \ cipherSuite : cipherSuites) {\n                boolean isSecure = true;\n                \n                for (String\
      \ blockedPrefix : BLOCKED_CIPHER_SUITES) {\n                    if (cipherSuite.startsWith(blockedPrefix)) {\n     \
      \                   isSecure = false;\n                        break;\n                    }\n                }\n  \
      \              \n                if (isSecure) {\n                    secureCipherSuites.add(cipherSuite);\n       \
      \         }\n            }\n            \n            return secureCipherSuites.toArray(new String[0]);\n        }\n\
      \    }\n}"
