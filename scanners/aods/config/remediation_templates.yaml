      \ this.transitEncryptionRequired = required; }\n        public void setMinRsaKeySize(int size) { this.minRsaKeySize\
      \ = size; }\n        public void setMinEcKeySize(int size) { this.minEcKeySize = size; }\n        public void setHttpsRequired(boolean\
      \ required) { this.httpsRequired = required; }\n    }\n}"
