      \ FilePermission.READ);\n            assertTrue(\"Extension should be allowed: \" + ext, allowed);\n        }\n    \
      \    \n        for (String ext : blockedExtensions) {\n            File testFile = new File(\"/test/file\" + ext);\n\
      \            boolean allowed = controller.checkFileAccess(\"testuser\", testFile, FilePermission.READ);\n          \
      \  assertFalse(\"Extension should be blocked: \" + ext, allowed);\n        }\n    }\n    \n    @Test\n    public void\
      \ testPerformanceWithLargeInputs() {\n        // Test that validation doesn't have performance issues with large inputs\n\
      \        StringBuilder largeInput = new StringBuilder();\n        for (int i = 0; i < 10000; i++) {\n            largeInput.append(\"\
      ../\");\n        }\n        largeInput.append(\"file.txt\");\n        \n        long startTime = System.currentTimeMillis();\n\
      \        try {\n            fileManager.getSecureFile(largeInput.toString(), \"/test/base/path/documents\");\n     \
      \       fail(\"Large traversal input should be blocked\");\n        } catch (SecurityException e) {\n            //\
      \ Expected\n        }\n        long endTime = System.currentTimeMillis();\n        \n        // Validation should complete\
      \ quickly even with large input\n        assertTrue(\"Validation should complete within 100ms\", (endTime - startTime)\
      \ < 100);\n    }\n    \n    // Helper methods for testing\n    private String validateZipEntryName(String entryName)\
      \ {\n        if (entryName == null || entryName.contains(\"../\") || \n            entryName.contains(\"..\\\\\") ||\
      \ entryName.startsWith(\"/\")) {\n            return null;\n        }\n        return entryName;\n    }\n    \n    private\
      \ boolean isWithinBounds(File file, File baseDirectory) {\n        try {\n            String canonicalFilePath = file.getCanonicalPath();\n\
