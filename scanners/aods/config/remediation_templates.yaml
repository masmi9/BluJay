      \            } catch (SecurityException e) {\n                // Expected - attack blocked\n                assertTrue(\"\
      Security exception should mention path traversal\", \n                          e.getMessage().toLowerCase().contains(\"\
      traversal\") || \n                          e.getMessage().toLowerCase().contains(\"invalid\"));\n            }\n  \
      \      }\n    }\n    \n    @Test \n    public void testZipSlipAttackPrevention() {\n        // Create test zip with\
