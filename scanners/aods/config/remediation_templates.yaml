      \     recentEvents.add(event);\n        if (recentEvents.size() > 100) {\n            recentEvents.remove(0);\n    \
      \    }\n    }\n    \n    public List<SecurityEvent> getSecurityEvents() {\n        return new ArrayList<>(recentEvents);\n\
      \    }\n}"
