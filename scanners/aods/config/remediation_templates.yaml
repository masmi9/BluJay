  - step_number: 3
    title: Implement Content Security Policy (CSP) and Web Security Headers
    description: Add Content Security Policy implementation and security headers to prevent XSS and injection
      attacks.
    code_example: "// Content Security Policy (CSP) Implementation\npublic class CSPManager {\n    private static final String\
      \ DEFAULT_CSP_POLICY = \n        \"default-src 'self'; \" +\n        \"script-src 'self' 'unsafe-inline'; \" +\n   \
      \     \"style-src 'self' 'unsafe-inline'; \" +\n        \"img-src 'self' data: https:; \" +\n        \"font-src 'self';\
      \ \" +\n        \"connect-src 'self' https:; \" +\n        \"media-src 'none'; \" +\n        \"object-src 'none'; \"\
      \ +\n        \"child-src 'none'; \" +\n        \"frame-src 'none'; \" +\n        \"worker-src 'none'; \" +\n       \
      \ \"form-action 'self'; \" +\n        \"upgrade-insecure-requests\";\n    \n    private String customCSPPolicy;\n  \
      \  \n    public CSPManager() {\n        this.customCSPPolicy = DEFAULT_CSP_POLICY;\n    }\n    \n    public Map<String,\
      \ String> getCSPHeaders() {\n        Map<String, String> headers = new HashMap<>();\n        \n        // Content Security\
      \ Policy\n        headers.put(\"Content-Security-Policy\", customCSPPolicy);\n        headers.put(\"X-Content-Security-Policy\"\
      , customCSPPolicy);  // Legacy support\n        headers.put(\"X-WebKit-CSP\", customCSPPolicy);  // WebKit support\n\
      \        \n        // Additional security headers\n        headers.put(\"X-Frame-Options\", \"DENY\");  // Prevent clickjacking\n\
      \        headers.put(\"X-Content-Type-Options\", \"nosniff\");  // Prevent MIME sniffing\n        headers.put(\"X-XSS-Protection\"\
      , \"1; mode=block\");  // XSS protection\n        headers.put(\"Referrer-Policy\", \"strict-origin-when-cross-origin\"\
      );  // Referrer control\n        headers.put(\"Permissions-Policy\", \"geolocation=(), microphone=(), camera=()\");\
      \  // Feature restrictions\n        \n        return headers;\n    }\n    \n    public void setCustomCSP(String policy)\
      \ {\n        if (isValidCSPPolicy(policy)) {\n            this.customCSPPolicy = policy;\n        } else {\n       \
      \     Log.w(\"CSP\", \"Invalid CSP policy provided, using default\");\n        }\n    }\n    \n    private boolean isValidCSPPolicy(String\
      \ policy) {\n        // Basic CSP policy validation\n        return policy != null && \n               policy.contains(\"\
      default-src\") && \n               !policy.contains(\"'unsafe-eval'\") &&  // Prevent eval()\n               policy.length()\
      \ < 2048;  // Reasonable length limit\n    }\n}\n\n// Secure WebView client with security controls\npublic\
      \ class SecureWebViewClient extends WebViewClient {\n    private CSPManager cspManager;\n    private Set<String> allowedDomains;\n\
      \    private SecurityEventLogger logger;\n    \n    public SecureWebViewClient() {\n        this.cspManager = new CSPManager();\n\
      \        this.allowedDomains = Set.of(\n            \"trusted-domain.com\",\n            \"app.company.com\"\n     \
      \   );\n        this.logger = new SecurityEventLogger();\n    }\n    \n    @Override\n    public boolean shouldOverrideUrlLoading(WebView\
      \ view, WebResourceRequest request) {\n        String url = request.getUrl().toString();\n        \n        // Log all\
      \ URL loading attempts\n        logger.logUrlAccess(url);\n        \n        // Block unauthorized domains\n       \
      \ if (!isAllowedDomain(url)) {\n            logger.logSecurityEvent(\"BLOCKED_DOMAIN\", url);\n            return true;\
      \  // Block the navigation\n        }\n        \n        // Block dangerous protocols\n        if (isDangerousProtocol(url))\
      \ {\n            logger.logSecurityEvent(\"BLOCKED_PROTOCOL\", url);\n            return true;  // Block the navigation\n\
      \        }\n        \n        // Allow trusted navigation\n        return false;  // Let WebView handle it\n    }\n\
      \    \n    @Override\n    public void onPageStarted(WebView view, String url, Bitmap favicon) {\n        super.onPageStarted(view,\
      \ url, favicon);\n        \n        // Inject CSP meta tag if not present\n        injectCSPMetaTag(view);\n       \
      \ \n        // Log page load\n        logger.logPageLoad(url);\n    }\n    \n    @Override\n    public void onReceivedError(WebView\
      \ view, WebResourceRequest request, WebResourceError error) {\n        super.onReceivedError(view, request, error);\n\
      \        \n        // Log security-related errors\n        logger.logWebViewError(request.getUrl().toString(), error.getDescription().toString());\n\
      \        \n        // Load secure error page instead of showing error details\n        view.loadData(createSecureErrorPage(),\
      \ \"text/html\", \"UTF-8\");\n    }\n    \n    @Override\n    public void onReceivedSslError(WebView view, SslErrorHandler\
      \ handler, SslError error) {\n        // Always reject SSL errors for security\n        handler.cancel();\n        \n\
      \        // Log SSL error\n        logger.logSecurityEvent(\"SSL_ERROR\", error.toString());\n        \n        // Show\
      \ secure error message\n        view.loadData(createSSLErrorPage(), \"text/html\", \"UTF-8\");\n    }\n    \n    private\
      \ boolean isAllowedDomain(String url) {\n        try {\n            URI uri = new URI(url);\n            String domain\
      \ = uri.getHost();\n            return allowedDomains.contains(domain);\n        } catch (Exception e) {\n         \
      \   return false;\n        }\n    }\n    \n    private boolean isDangerousProtocol(String url) {\n        String[] dangerousProtocols\
      \ = {\"javascript:\", \"data:\", \"file:\", \"ftp:\"};\n        String lowerUrl = url.toLowerCase();\n        \n   \
      \     for (String protocol : dangerousProtocols) {\n            if (lowerUrl.startsWith(protocol)) {\n             \
      \   return true;\n            }\n        }\n        \n        return false;\n    }\n    \n    private void injectCSPMetaTag(WebView\
      \ view) {\n        String cspInjection = \"\"\"\n            (function() {\n                if (!document.querySelector('meta[http-equiv=\"\
      Content-Security-Policy\"]')) {\n                    var meta = document.createElement('meta');\n                  \
      \  meta.httpEquiv = 'Content-Security-Policy';\n                    meta.content = '%s';\n                    document.head.appendChild(meta);\n\
      \                }\n            })();\n        \"\"\".formatted(cspManager.getCSPHeaders().get(\"Content-Security-Policy\"\
      ));\n        \n        view.evaluateJavascript(cspInjection, null);\n    }\n    \n    private String createSecureErrorPage()\
      \ {\n        return \"\"\"\n        <html>\n        <head>\n            <meta http-equiv=\"Content-Security-Policy\"\
      \ content=\"default-src 'none'; style-src 'unsafe-inline';\">\n            <title>Error</title>\n        </head>\n \
      \       <body>\n            <h1>Page Could Not Be Loaded</h1>\n            <p>The requested page could not be loaded\
      \ due to a security policy.</p>\n        </body>\n        </html>\n        \"\"\";\n    }\n    \n    private String\
      \ createSSLErrorPage() {\n        return \"\"\"\n        <html>\n        <head>\n            <meta http-equiv=\"Content-Security-Policy\"\
      \ content=\"default-src 'none'; style-src 'unsafe-inline';\">\n            <title>SSL Error</title>\n        </head>\n\
      \        <body>\n            <h1>Secure Connection Failed</h1>\n            <p>Could not establish a secure connection\
      \ to the server.</p>\n        </body>\n        </html>\n        \"\"\";\n    }\n}"
