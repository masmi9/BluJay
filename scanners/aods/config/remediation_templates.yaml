    title: Implement SSL/TLS Security Validation and Monitoring
    description: Add full SSL/TLS security validation, monitoring, and threat detection for all network communications.
    code_example: "// Full SSL/TLS Security Validation and Monitoring\npublic class SSLTLSSecurityMonitor {\n   \
      \ private static final String TAG = \"SSLTLSSecurityMonitor\";\n    private SecurityEventLogger logger;\n    private\
      \ SSLSecurityMetrics metrics;\n    private ThreatDetectionEngine threatDetector;\n    private AlertManager alertManager;\n\
      \    \n    public SSLTLSSecurityMonitor(Context context) {\n        this.logger = new SecurityEventLogger(context);\n\
      \        this.metrics = new SSLSecurityMetrics();\n        this.threatDetector = new ThreatDetectionEngine();\n    \
      \    this.alertManager = new AlertManager(context);\n    }\n    \n    // Monitor SSL/TLS connection establishment\n\
      \    public void monitorSSLConnection(String hostname, SSLSession session, X509Certificate[] certificates) {\n     \
      \   try {\n            // Validate SSL/TLS session\n            SSLValidationResult validation = validateSSLSession(session,\
      \ certificates);\n            \n            if (!validation.isSecure()) {\n                logger.logSecurityThreat(\"\
      INSECURE_SSL_CONNECTION\", hostname, validation.getSecurityIssues());\n                alertManager.sendSecurityAlert(\"\
      Insecure SSL Connection\", \n                    \"Host: \" + hostname + \", Issues: \" + validation.getSecurityIssues());\n\
      \                metrics.incrementInsecureConnections();\n            } else {\n                logger.logSecureConnection(hostname,\
      \ session);\n                metrics.incrementSecureConnections();\n            }\n            \n            // Certificate\
      \ validation and monitoring\n            CertificateValidationResult certValidation = validateCertificates(hostname,\
      \ certificates);\n            if (!certValidation.isValid()) {\n                logger.logSecurityThreat(\"CERTIFICATE_VALIDATION_FAILED\"\
      , hostname, certValidation.getFailureReason());\n                metrics.incrementCertificateFailures();\n         \
      \   }\n            \n            // Detect potential MITM attacks\n            if (threatDetector.detectMITMAttempt(hostname,\
      \ certificates)) {\n                logger.logSecurityThreat(\"POTENTIAL_MITM_ATTACK\", hostname, \"Suspicious certificate\
      \ characteristics detected\");\n                alertManager.sendImmediateAlert(\"Potential MITM Attack\", \"Host: \"\
      \ + hostname);\n                metrics.incrementMITMAttempts();\n            }\n            \n        } catch (Exception\
      \ e) {\n            logger.logSecurityEvent(\"SSL_MONITORING_ERROR\", hostname, e.getMessage());\n        }\n    }\n\
      \    \n    // Full SSL/TLS session validation\n    private SSLValidationResult validateSSLSession(SSLSession\
      \ session, X509Certificate[] certificates) {\n        SSLValidationResult result = new SSLValidationResult();\n    \
      \    \n        // Validate TLS version\n        String protocol = session.getProtocol();\n        if (!isSecureProtocol(protocol))\
      \ {\n            result.addSecurityIssue(\"Insecure TLS version: \" + protocol);\n        }\n        \n        // Validate\
      \ cipher suite\n        String cipherSuite = session.getCipherSuite();\n        CipherSuiteAnalysis cipherAnalysis =\
      \ analyzeCipherSuite(cipherSuite);\n        if (!cipherAnalysis.isSecure()) {\n            result.addSecurityIssue(\"\
      Insecure cipher suite: \" + cipherSuite + \" - \" + cipherAnalysis.getWeakness());\n        }\n        \n        //\
      \ Validate key exchange\n        if (!hasForwardSecrecy(cipherSuite)) {\n            result.addSecurityIssue(\"No perfect\
      \ forward secrecy\");\n        }\n        \n        // Validate session properties\n        validateSessionProperties(session,\
      \ result);\n        \n        return result;\n    }\n    \n    private boolean isSecureProtocol(String protocol) {\n\
      \        return \"TLSv1.3\".equals(protocol) || \"TLSv1.2\".equals(protocol);\n    }\n    \n    private CipherSuiteAnalysis\
      \ analyzeCipherSuite(String cipherSuite) {\n        CipherSuiteAnalysis analysis = new CipherSuiteAnalysis();\n    \
      \    \n        // Check for weak encryption\n        if (cipherSuite.contains(\"DES\") || cipherSuite.contains(\"RC4\"\
      ) || \n            cipherSuite.contains(\"NULL\") || cipherSuite.contains(\"EXPORT\")) {\n            analysis.setSecure(false);\n\
      \            analysis.setWeakness(\"Weak encryption algorithm\");\n            return analysis;\n        }\n       \
      \ \n        // Check for weak authentication\n        if (cipherSuite.contains(\"anon\") || cipherSuite.contains(\"\
      ADH\")) {\n            analysis.setSecure(false);\n            analysis.setWeakness(\"Anonymous authentication\");\n\
      \            return analysis;\n        }\n        \n        // Check for weak key exchange\n        if (cipherSuite.startsWith(\"\
      TLS_RSA_\") && !cipherSuite.contains(\"ECDHE\") && !cipherSuite.contains(\"DHE\")) {\n            analysis.setSecure(false);\n\
      \            analysis.setWeakness(\"No forward secrecy\");\n            return analysis;\n        }\n        \n    \
      \    // Check for weak MAC\n        if (cipherSuite.contains(\"MD5\") || cipherSuite.contains(\"SHA1\")) {\n       \
      \     analysis.setSecure(false);\n            analysis.setWeakness(\"Weak MAC algorithm\");\n            return analysis;\n\
      \        }\n        \n        analysis.setSecure(true);\n        return analysis;\n    }\n    \n    private boolean\
      \ hasForwardSecrecy(String cipherSuite) {\n        return cipherSuite.contains(\"ECDHE\") || cipherSuite.contains(\"\
      DHE\");\n    }\n    \n    private void validateSessionProperties(SSLSession session, SSLValidationResult result) {\n\
      \        try {\n            // Check session timeout\n            if (session.getCreationTime() + session.getSessionContext().getSessionTimeout()\
      \ * 1000 < System.currentTimeMillis()) {\n                result.addSecurityIssue(\"SSL session expired\");\n      \
      \      }\n            \n            // Validate session ID\n            byte[] sessionId = session.getId();\n      \
      \      if (sessionId == null || sessionId.length < 16) {\n                result.addSecurityIssue(\"Weak or missing\
      \ session ID\");\n            }\n            \n        } catch (Exception e) {\n            result.addSecurityIssue(\"\
      Session validation error: \" + e.getMessage());\n        }\n    }\n    \n    // Certificate validation\n    private\
      \ CertificateValidationResult validateCertificates(String hostname, X509Certificate[] certificates) {\n        CertificateValidationResult\
      \ result = new CertificateValidationResult();\n        \n        if (certificates == null || certificates.length ==\
      \ 0) {\n            result.setValid(false);\n            result.setFailureReason(\"No certificates provided\");\n  \
      \          return result;\n        }\n        \n        X509Certificate serverCert = certificates[0];\n        \n  \
      \      try {\n            // Check certificate validity\n            serverCert.checkValidity();\n            \n   \
      \         // Validate certificate chain\n            validateCertificateChain(certificates, result);\n            \n\
      \            // Check key strength\n            validateKeyStrength(serverCert, result);\n            \n           \
      \ // Check signature algorithm\n            validateSignatureAlgorithm(serverCert, result);\n            \n        \
      \    // Validate certificate extensions\n            validateCertificateExtensions(serverCert, hostname, result);\n\
      \            \n            if (result.getFailureReason() == null) {\n                result.setValid(true);\n      \
      \      }\n            \n        } catch (CertificateExpiredException e) {\n            result.setValid(false);\n   \
      \         result.setFailureReason(\"Certificate expired\");\n        } catch (CertificateNotYetValidException e) {\n\
      \            result.setValid(false);\n            result.setFailureReason(\"Certificate not yet valid\");\n        }\
      \ catch (Exception e) {\n            result.setValid(false);\n            result.setFailureReason(\"Certificate validation\
      \ error: \" + e.getMessage());\n        }\n        \n        return result;\n    }\n    \n    private void validateCertificateChain(X509Certificate[]\
      \ certificates, CertificateValidationResult result) {\n        // Validate certificate chain length\n        if (certificates.length\
      \ < 2) {\n            result.addWarning(\"Short certificate chain\");\n        }\n        \n        // Validate chain\
      \ integrity\n        for (int i = 0; i < certificates.length - 1; i++) {\n            try {\n                certificates[i].verify(certificates[i\
      \ + 1].getPublicKey());\n            } catch (Exception e) {\n                result.setValid(false);\n            \
      \    result.setFailureReason(\"Certificate chain verification failed\");\n                return;\n            }\n \
      \       }\n    }\n    \n    private void validateKeyStrength(X509Certificate certificate, CertificateValidationResult\
      \ result) {\n        PublicKey publicKey = certificate.getPublicKey();\n        \n        if (publicKey instanceof RSAPublicKey)\
      \ {\n            RSAPublicKey rsaKey = (RSAPublicKey) publicKey;\n            int keySize = rsaKey.getModulus().bitLength();\n\
      \            if (keySize < 2048) {\n                result.setValid(false);\n                result.setFailureReason(\"\
      RSA key too weak: \" + keySize + \" bits\");\n            } else if (keySize < 3072) {\n                result.addWarning(\"\
      RSA key size below recommended: \" + keySize + \" bits\");\n            }\n        } else if (publicKey instanceof ECPublicKey)\
      \ {\n            ECPublicKey ecKey = (ECPublicKey) publicKey;\n            int fieldSize = ecKey.getParams().getCurve().getField().getFieldSize();\n\
      \            if (fieldSize < 256) {\n                result.setValid(false);\n                result.setFailureReason(\"\
      EC key too weak: \" + fieldSize + \" bits\");\n            }\n        }\n    }\n    \n    private void validateSignatureAlgorithm(X509Certificate\
      \ certificate, CertificateValidationResult result) {\n        String sigAlgName = certificate.getSigAlgName().toLowerCase();\n\
      \        \n        if (sigAlgName.contains(\"md5\")) {\n            result.setValid(false);\n            result.setFailureReason(\"\
      MD5 signature algorithm is insecure\");\n        } else if (sigAlgName.contains(\"sha1\")) {\n            result.addWarning(\"\
      SHA-1 signature algorithm is deprecated\");\n        }\n    }\n    \n    private void validateCertificateExtensions(X509Certificate\
      \ certificate, String hostname, \n                                             CertificateValidationResult result) {\n\
      \        try {\n            // Validate Subject Alternative Name\n            Collection<List<?>> subjAltNames = certificate.getSubjectAlternativeNames();\n\
      \            boolean hostnameFound = false;\n            \n            if (subjAltNames != null) {\n               \
      \ for (List<?> subjAltName : subjAltNames) {\n                    Integer type = (Integer) subjAltName.get(0);\n   \
      \                 if (type == 2) { // DNS name\n                        String dnsName = (String) subjAltName.get(1);\n\
      \                        if (hostname.equals(dnsName) || matchesWildcard(hostname, dnsName)) {\n                   \
      \         hostnameFound = true;\n                            break;\n                        }\n                   \
      \ }\n                }\n            }\n            \n            if (!hostnameFound) {\n                // Check CN\
      \ in subject\n                String subject = certificate.getSubjectDN().getName();\n                if (!subject.contains(\"\
      CN=\" + hostname)) {\n                    result.addWarning(\"Hostname not found in certificate\");\n              \
      \  }\n            }\n            \n            // Check for certificate transparency extension\n            if (certificate.getExtensionValue(\"\
      1.3.6.1.4.1.11129.2.4.2\") == null) {\n                result.addWarning(\"Certificate Transparency extension missing\"\
      );\n            }\n            \n        } catch (Exception e) {\n            result.addWarning(\"Extension validation\
      \ error: \" + e.getMessage());\n        }\n    }\n    \n    private boolean matchesWildcard(String hostname, String\
      \ pattern) {\n        if (!pattern.startsWith(\"*.\")) {\n            return false;\n        }\n        \n        String\
      \ domain = pattern.substring(2);\n        return hostname.endsWith(domain) && hostname.length() > domain.length() &&\n\
      \               hostname.charAt(hostname.length() - domain.length() - 1) == '.';\n    }\n    \n    // MITM detection\n\
      \    private static class ThreatDetectionEngine {\n        private Map<String, CertificateFingerprint> knownCertificates\
      \ = new HashMap<>();\n        \n        public boolean detectMITMAttempt(String hostname, X509Certificate[] certificates)\
      \ {\n            if (certificates == null || certificates.length == 0) {\n                return false;\n          \
      \  }\n            \n            X509Certificate serverCert = certificates[0];\n            CertificateFingerprint currentFingerprint\
      \ = calculateFingerprint(serverCert);\n            \n            CertificateFingerprint knownFingerprint = knownCertificates.get(hostname);\n\
      \            if (knownFingerprint == null) {\n                // First time seeing this certificate\n              \
      \  knownCertificates.put(hostname, currentFingerprint);\n                return false;\n            }\n            \n\
      \            // Check if certificate changed unexpectedly\n            if (!currentFingerprint.equals(knownFingerprint))\
      \ {\n                // Additional checks to reduce false positives\n                return detectSuspiciousCertificateChange(serverCert,\
      \ knownFingerprint);\n            }\n            \n            return false;\n        }\n        \n        private CertificateFingerprint\
      \ calculateFingerprint(X509Certificate certificate) {\n            try {\n                MessageDigest md = MessageDigest.getInstance(\"\
      SHA-256\");\n                byte[] fingerprint = md.digest(certificate.getEncoded());\n                return new CertificateFingerprint(fingerprint,\
      \ certificate.getNotAfter());\n            } catch (Exception e) {\n                return null;\n            }\n  \
      \      }\n        \n        private boolean detectSuspiciousCertificateChange(X509Certificate newCert, CertificateFingerprint\
      \ oldFingerprint) {\n            // Check if old certificate expired (legitimate reason for change)\n            if\
      \ (oldFingerprint.getExpiryDate().before(new Date())) {\n                return false;\n            }\n            \n\
      \            // Check if issuer changed dramatically\n            String newIssuer = newCert.getIssuerDN().getName();\n\
      \            if (newIssuer.toLowerCase().contains(\"untrusted\") || \n                newIssuer.toLowerCase().contains(\"\
      self-signed\")) {\n                return true;\n            }\n            \n            // Check certificate validity\
      \ period (suspiciously long validity)\n            long validityPeriod = newCert.getNotAfter().getTime() - newCert.getNotBefore().getTime();\n\
      \            long maxValidityPeriod = 365L * 24 * 60 * 60 * 1000; // 1 year\n            \n            return validityPeriod\
      \ > maxValidityPeriod;\n        }\n    }\n    \n    // Generate security report\n    public SSLSecurityReport generateSecurityReport()\
      \ {\n        return new SSLSecurityReport(\n            metrics.getMetrics(),\n            logger.getSecurityEvents(),\n\
      \            threatDetector.getThreatSummary()\n        );\n    }\n}"
