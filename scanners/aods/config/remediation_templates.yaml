hardcoded_credentials_remediation:
  fix_summary: Remove hardcoded credentials and implement secure credential management for {vuln_title}
  detailed_description: Hardcoded credentials (API keys, passwords, tokens, private keys) in source code pose critical security
    risks as they can be easily discovered through static analysis, reverse engineering, or code repository access. The fix
    involves removing hardcoded values, implementing secure credential storage, and using proper credential management systems.
  root_cause_analysis: Sensitive credentials are directly embedded in source code instead of using secure configuration management,
    environment variables, or dedicated credential storage systems.
  steps:
  - step_number: 1
    title: Identify and Catalog All Hardcoded Credentials
    description: Systematically identify all hardcoded credentials in {location} including API keys, passwords, tokens, database
      connection strings, and private keys.
    code_example: "// Common hardcoded credential patterns to identify:\n// API Keys\nString apiKey = \"AIzaSyC4LF9hsG0hFq6V3QCH9kLX_example_key\"\
      ;\nString apiKey = \"sk_live_REDACTED_EXAMPLE_KEY\";\n\n// Passwords  \nString password = \"mySecretPassword123\"\
      ;\nString dbPassword = \"admin123\";\n\n// Tokens\nString token = \"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example\";\n\
      String bearerToken = \"Bearer abc123def456example\";\n\n// Database Connections\nString jdbcUrl = \"jdbc:mysql://localhost:3306/db?user=admin&password=secret123\"\
      ;\n\n// Private Keys\nString privateKey = \"-----BEGIN PRIVATE KEY-----\\nMIIEvQIBADANBgkq...\";"
    verification_method: Automated static analysis scan and manual code review to ensure all credentials are identified
    estimated_hours: 1.0
    complexity: simple
  - step_number: 2
    title: Remove Hardcoded Values and Create Placeholders
    description: Remove all hardcoded credential values from source code and replace with environment variable or configuration
      placeholders.
    code_example: '// Before (Vulnerable) - Hardcoded credentials

      String apiKey = "AIzaSyC4LF9hsG0hFq6V3QCH9kLX_example_key";

      String dbUrl = "jdbc:mysql://localhost:3306/db?user=admin&password=secret123";


      // After (Secure) - Using environment variables

      String apiKey = System.getenv("GOOGLE_API_KEY");

      String dbUrl = System.getenv("DATABASE_URL");


      // Alternative - Using properties file

      Properties config = new Properties();

      config.load(getClass().getResourceAsStream("/config.properties"));

      String apiKey = config.getProperty("api.key");


      // Alternative - Using Android SharedPreferences (encrypted)

      SharedPreferences prefs = getEncryptedSharedPreferences();

      String apiKey = prefs.getString("api_key", null);'
    verification_method: Code review to confirm no hardcoded credentials remain in source
    estimated_hours: 2.0
    complexity: simple
  - step_number: 3
    title: Implement Secure Credential Storage
    description: Set up secure credential storage using appropriate mechanisms for the deployment environment (environment
      variables, encrypted configuration, key management services).
    code_example: "// Android - Using EncryptedSharedPreferences\nprivate SharedPreferences getEncryptedSharedPreferences()\
      \ {\n    MasterKey masterKey = new MasterKey.Builder(context)\n        .setKeyScheme(MasterKey.KeyScheme.AES256_GCM)\n\
      \        .build();\n    \n    return EncryptedSharedPreferences.create(\n        context,\n        \"secure_credentials\"\
      ,\n        masterKey,\n        EncryptedSharedPreferences.PrefKeyEncryptionScheme.AES256_SIV,\n        EncryptedSharedPreferences.PrefValueEncryptionScheme.AES256_GCM\n\
      \    );\n}\n\n// Android - Using Android Keystore for key storage\nprivate void storeCredentialInKeystore(String alias,\
      \ String credential) {\n    KeyGenerator keyGenerator = KeyGenerator.getInstance(\"AES\", \"AndroidKeyStore\");\n  \
      \  KeyGenParameterSpec keySpec = new KeyGenParameterSpec.Builder(alias,\n        KeyProperties.PURPOSE_ENCRYPT | KeyProperties.PURPOSE_DECRYPT)\n\
      \        .setBlockModes(KeyProperties.BLOCK_MODE_GCM)\n        .setEncryptionPaddings(KeyProperties.ENCRYPTION_PADDING_NONE)\n\
      \        .build();\n    \n    keyGenerator.init(keySpec);\n    SecretKey secretKey = keyGenerator.generateKey();\n \
      \   // Use secretKey to encrypt credential for storage\n}\n\n// Server Environment - Environment variables\nexport GOOGLE_API_KEY=\"\
      your-secure-api-key-here\"\nexport DATABASE_URL=\"jdbc:mysql://localhost:3306/db\"\nexport DATABASE_USER=\"dbuser\"\
      \  \nexport DATABASE_PASSWORD=\"secure-password-here\""
    verification_method: Verify secure storage implementation and encryption of sensitive values
    estimated_hours: 3.0
    complexity: moderate
  - step_number: 4
    title: Implement Credential Validation and Error Handling
    description: Add proper validation for credential availability and implement secure error handling that does not expose
      credential information.
    code_example: "// Secure credential validation\nprivate String getSecureApiKey() {\n    String apiKey = System.getenv(\"\
      GOOGLE_API_KEY\");\n    \n    if (apiKey == null || apiKey.trim().isEmpty()) {\n        throw new ConfigurationException(\"\
      API key not configured - check environment variables\");\n    }\n    \n    // Optional: Basic format validation without\
      \ logging the actual key\n    if (!isValidApiKeyFormat(apiKey)) {\n        throw new ConfigurationException(\"Invalid\
      \ API key format\");\n    }\n    \n    return apiKey;\n}\n\nprivate boolean isValidApiKeyFormat(String apiKey) {\n \
      \   // Validate format without exposing the key\n    return apiKey.length() >= 32 && apiKey.matches(\"^[A-Za-z0-9_-]+$\"\
      );\n}\n\n// Secure error handling\ntry {\n    String result = apiService.call(getSecureApiKey());\n} catch (ConfigurationException\
      \ e) {\n    logger.error(\"Configuration error: \" + e.getMessage()); // Safe to log\n} catch (ApiException e) {\n \
      \   logger.error(\"API call failed: \" + e.getMessage()); // Do not log credentials\n}"
    verification_method: Test error scenarios to ensure credentials are not exposed in logs or error messages
    estimated_hours: 1.5
    complexity: simple
  - step_number: 5
    title: Set up Credential Rotation and Management
    description: Implement credential rotation capabilities and establish proper credential lifecycle management.
    code_example: "// Credential management interface\npublic interface CredentialManager {\n    String getCredential(String\
      \ credentialId);\n    void rotateCredential(String credentialId, String newValue);\n    boolean isCredentialExpired(String\
      \ credentialId);\n    void refreshCredentials();\n}\n\n// Implementation example\npublic class SecureCredentialManager\
      \ implements CredentialManager {\n    private final Map<String, CredentialEntry> credentials = new ConcurrentHashMap<>();\n\
      \    \n    @Override\n    public String getCredential(String credentialId) {\n        CredentialEntry entry = credentials.get(credentialId);\n\
      \        if (entry == null) {\n            throw new CredentialNotFoundException(\"Credential not found: \" + credentialId);\n\
      \        }\n        \n        if (isCredentialExpired(credentialId)) {\n            refreshCredential(credentialId);\n\
      \        }\n        \n        return entry.getValue();\n    }\n    \n    @Override\n    public void rotateCredential(String\
      \ credentialId, String newValue) {\n        credentials.put(credentialId, new CredentialEntry(newValue, System.currentTimeMillis()));\n\
      \        logger.info(\"Credential rotated: \" + credentialId); // Safe to log ID, not value\n    }\n}"
    verification_method: Verify credential rotation functionality and management capabilities
    estimated_hours: 2.5
    complexity: moderate
  code_examples:
    environment_variables: String apiKey = System.getenv("API_KEY"); // Secure credential access
    encrypted_storage: SharedPreferences prefs = getEncryptedSharedPreferences(); String key = prefs.getString("api_key",
      null);
    validation: if (apiKey == null || apiKey.isEmpty()) { throw new ConfigurationException("Credential not configured"); }
    keystore_usage: KeyStore keyStore = KeyStore.getInstance("AndroidKeyStore"); // Use Android Keystore for keys
  verification_checklist:
  - No hardcoded credentials remain in source code
  - All credentials are accessed through secure configuration mechanism
  - Proper error handling without credential exposure
  - Credential validation and format checking implemented
  - Secure storage mechanism configured and tested
  - Credential rotation capability implemented
  - Logs and error messages do not contain credential values
  - Development, staging, and production use different credential sets
  best_practices:
  - Use environment variables for server-side applications
  - Use Android Keystore or EncryptedSharedPreferences for mobile apps
  - Implement credential rotation and lifecycle management
  - Never log or display credential values
  - Use different credentials for different environments (dev/staging/prod)
  - Implement proper access controls for credential storage
  - Regularly audit and rotate credentials
  - Use cloud key management services when available (AWS KMS, Azure Key Vault, etc.)
  - Implement credential expiration and automatic renewal
  - Use least-privilege principle for credential access
  prevention_measures:
  - Implement automated static analysis to detect hardcoded credentials
  - Set up pre-commit hooks to prevent credential commits
  - Establish secure development workflow with credential management guidelines
  - Provide developer training on secure credential handling
  - Use credential scanning tools in CI/CD pipeline
  - Implement code review requirements for credential-related changes
  - Establish incident response procedures for credential exposure
  - Regular security audits of credential management practices
  - Monitor version control systems for accidental credential commits
  - Use secrets management tools and services
  references:
  - OWASP Cryptographic Storage Cheat Sheet
  - 'CWE-798: Use of Hard-coded Credentials'
  - Android Keystore System Documentation
  - 'NIST SP 800-57: Recommendations for Key Management'
  - OWASP Mobile Security Testing Guide - Cryptography
  - Google Cloud Secret Manager Best Practices
  - AWS Secrets Manager Documentation
  - Azure Key Vault Best Practices
component_export_remediation:
  fix_summary: Secure Android component exports and implement proper intent validation for {vuln_title}
  detailed_description: Improper Android component export vulnerabilities (CWE-926) occur when Activities, Services, Broadcast
    Receivers, or Content Providers are unnecessarily exposed to external applications without proper access controls. This
    allows malicious apps to invoke components, intercept intents, or access sensitive data. The fix involves analyzing component
    export necessity, implementing proper permissions, and adding intent validation.
  root_cause_analysis: Android components are exported either explicitly (android:exported="true") or implicitly (having intent
    filters) without adequate permission controls, intent validation, or consideration of export necessity.
  steps:
  - step_number: 1
    title: Analyze Component Export Necessity
    description: Review all exported components in {location} to determine which components genuinely need to be accessible
      by external applications versus those that should remain private.
    code_example: "<!-- Current vulnerable export configuration -->\n<activity \n    android:name=\".LoginActivity\"\n   \
      \ android:exported=\"true\" />  <!-- Unnecessarily exposed -->\n\n<service \n    android:name=\".DataSyncService\">\n\
      \    <intent-filter>  <!-- Implicitly exported -->\n        <action android:name=\"com.app.DATA_SYNC\" />\n    </intent-filter>\n\
      </service>\n\n<!-- Analysis questions to ask: -->\n// 1. Does LoginActivity need to be launched by other apps? NO →\
      \ Make private\n// 2. Does DataSyncService need external access? NO → Make private  \n// 3. Are there intent filters\
      \ that don't require external access? YES → Remove or secure\n\n<!-- Component necessity assessment -->\nComponents\
      \ requiring external access:\n✓ MainActivity (app launcher)\n✓ ShareActivity (receive share intents)\n✗ LoginActivity\
      \ (internal use only)\n✗ DataSyncService (internal use only)\n✗ ConfigReceiver (internal configuration)"
    verification_method: Manual review of all components against functional requirements to confirm export necessity
    estimated_hours: 2.0
    complexity: simple
  - step_number: 2
    title: Implement Manifest Security Modifications
    description: Update AndroidManifest.xml to explicitly control component exports and add appropriate permission controls
      for components that must remain exported.
    code_example: "<!-- Before (Vulnerable) - Implicit and unnecessary exports -->\n<activity \n    android:name=\".LoginActivity\"\
      \n    android:exported=\"true\" />\n\n<service android:name=\".DataSyncService\">\n    <intent-filter>\n        <action\
      \ android:name=\"com.app.DATA_SYNC\" />\n    </intent-filter>\n</service>\n\n<receiver android:name=\".ConfigReceiver\"\
      >\n    <intent-filter>\n        <action android:name=\"com.app.CONFIG_UPDATE\" />\n    </intent-filter>\n</receiver>\n\
      \n<!-- After (Secure) - Explicit control with permissions -->\n<!-- Private components - no external access -->\n<activity\
      \ \n    android:name=\".LoginActivity\"\n    android:exported=\"false\" />\n\n<service \n    android:name=\".DataSyncService\"\
      \n    android:exported=\"false\" />\n\n<!-- Controlled exports with permissions -->\n<receiver \n    android:name=\"\
      .ConfigReceiver\"\n    android:exported=\"true\"\n    android:permission=\"com.yourapp.permission.CONFIG_ACCESS\">\n\
      \    <intent-filter>\n        <action android:name=\"com.app.CONFIG_UPDATE\" />\n    </intent-filter>\n</receiver>\n\
      \n<!-- Define custom permissions -->\n<permission \n    android:name=\"com.yourapp.permission.CONFIG_ACCESS\"\n    android:label=\"\
      @string/config_permission_label\"\n    android:description=\"@string/config_permission_desc\"\n    android:protectionLevel=\"\
      signature\" />"
    verification_method: Static analysis to verify explicit export control and proper permission implementation
    estimated_hours: 1.5
    complexity: simple
  - step_number: 3
    title: Implement Intent Parameter Validation
    description: Add input validation for all intents received by exported components to prevent malicious parameter
      injection and data manipulation.
    code_example: "// Before (Vulnerable) - No intent validation\n@Override\nprotected void onCreate(Bundle savedInstanceState)\
      \ {\n    super.onCreate(savedInstanceState);\n    \n    Intent intent = getIntent();\n    String userId = intent.getStringExtra(\"\
      user_id\");\n    String action = intent.getStringExtra(\"action\");\n    \n    // Direct usage without validation -\
      \ VULNERABLE\n    performAction(userId, action);\n}\n\n// After (Secure) - Intent validation\n@Override\n\
      protected void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    \n    Intent intent\
      \ = getIntent();\n    \n    // Validate intent source and parameters\n    if (!validateIntentSecurity(intent)) {\n \
      \       Log.w(TAG, \"Invalid intent received, terminating\");\n        finish();\n        return;\n    }\n    \n   \
      \ String userId = validateAndGetUserId(intent);\n    String action = validateAndGetAction(intent);\n    \n    if (userId\
      \ != null && action != null) {\n        performAction(userId, action);\n    } else {\n        Log.w(TAG, \"Invalid parameters\
      \ in intent\");\n        finish();\n    }\n}\n\nprivate boolean validateIntentSecurity(Intent intent) {\n    // Validate\
      \ intent signature and source\n    String callingPackage = getCallingPackage();\n    \n    if (callingPackage == null)\
      \ {\n        return false; // No calling package information\n    }\n    \n    // Whitelist approach - only allow trusted\
      \ packages\n    List<String> trustedPackages = Arrays.asList(\n        \"com.yourcompany.mainapp\",\n        \"com.yourcompany.settings\"\
      \n    );\n    \n    return trustedPackages.contains(callingPackage);\n}\n\nprivate String validateAndGetUserId(Intent\
      \ intent) {\n    String userId = intent.getStringExtra(\"user_id\");\n    \n    if (userId == null || userId.trim().isEmpty())\
      \ {\n        return null;\n    }\n    \n    // Validate user ID format (UUID pattern)\n    if (!userId.matches(\"^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$\"\
      )) {\n        Log.w(TAG, \"Invalid user ID format\");\n        return null;\n    }\n    \n    return userId;\n}\n\n\
      private String validateAndGetAction(Intent intent) {\n    String action = intent.getStringExtra(\"action\");\n    \n\
      \    // Whitelist allowed actions\n    List<String> allowedActions = Arrays.asList(\"VIEW\", \"EDIT\", \"SHARE\");\n\
      \    \n    if (action == null || !allowedActions.contains(action.toUpperCase())) {\n        Log.w(TAG, \"Invalid or\
      \ unauthorized action: \" + action);\n        return null;\n    }\n    \n    return action.toUpperCase();\n}"
    verification_method: Code review and penetration testing with malicious intents to verify validation effectiveness
    estimated_hours: 3.0
    complexity: moderate
  - step_number: 4
    title: Implement Signature-Level Permission Controls
    description: Design and implement signature-level permissions to restrict component access to applications signed with
      the same certificate, providing the highest level of protection.
    code_example: "<!-- Define signature-level permissions in AndroidManifest.xml -->\n<permission \n    android:name=\"com.yourapp.permission.INTERNAL_ACCESS\"\
      \n    android:label=\"@string/internal_access_permission_label\"\n    android:description=\"@string/internal_access_permission_desc\"\
      \n    android:protectionLevel=\"signature\" />\n\n<permission \n    android:name=\"com.yourapp.permission.SENSITIVE_DATA_ACCESS\"\
      \n    android:label=\"@string/sensitive_data_permission_label\"\n    android:description=\"@string/sensitive_data_permission_desc\"\
      \n    android:protectionLevel=\"signature|privileged\" />\n\n<!-- Apply permissions to components -->\n<activity \n\
      \    android:name=\".SensitiveDataActivity\"\n    android:exported=\"true\"\n    android:permission=\"com.yourapp.permission.SENSITIVE_DATA_ACCESS\"\
      \ />\n\n<service \n    android:name=\".InternalSyncService\"\n    android:exported=\"true\"\n    android:permission=\"\
      com.yourapp.permission.INTERNAL_ACCESS\" />\n\n<provider \n    android:name=\".SecureContentProvider\"\n    android:authorities=\"\
      com.yourapp.secure.provider\"\n    android:exported=\"true\"\n    android:permission=\"com.yourapp.permission.SENSITIVE_DATA_ACCESS\"\
      \ />\n\n<!-- Runtime permission checking in code -->\npublic class SensitiveDataActivity extends AppCompatActivity {\n\
      \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
      \        \n        // Additional runtime verification\n        if (!hasRequiredPermissions()) {\n            Log.e(TAG,\
      \ \"Unauthorized access attempt\");\n            finish();\n            return;\n        }\n        \n        // Safe\
      \ to proceed with sensitive operations\n        loadSensitiveData();\n    }\n    \n    private boolean hasRequiredPermissions()\
      \ {\n        // Verify calling package has signature-level permission\n        int permissionCheck = checkCallingPermission(\"\
      com.yourapp.permission.SENSITIVE_DATA_ACCESS\");\n        \n        if (permissionCheck != PackageManager.PERMISSION_GRANTED)\
      \ {\n            return false;\n        }\n        \n        // Additional signature verification\n        return verifyCallingPackageSignature();\n\
      \    }\n    \n    private boolean verifyCallingPackageSignature() {\n        String callingPackage = getCallingPackage();\n\
      \        if (callingPackage == null) {\n            return false;\n        }\n        \n        try {\n            PackageManager\
      \ pm = getPackageManager();\n            Signature[] callingSignatures = pm.getPackageInfo(callingPackage, \n      \
      \          PackageManager.GET_SIGNATURES).signatures;\n            Signature[] mySignatures = pm.getPackageInfo(getPackageName(),\
      \ \n                PackageManager.GET_SIGNATURES).signatures;\n            \n            // Compare signatures\n  \
      \          return Arrays.equals(callingSignatures, mySignatures);\n        } catch (PackageManager.NameNotFoundException\
      \ e) {\n            Log.e(TAG, \"Package not found for signature verification\", e);\n            return false;\n  \
      \      }\n    }\n}"
    verification_method: Testing with signed and unsigned applications to verify signature-level protection
    estimated_hours: 2.5
    complexity: moderate
  - step_number: 5
    title: Implement Component Access Testing and Validation
    description: Create testing workflows to validate component security configurations and ensure exported
      components behave correctly under various access scenarios.
    code_example: "// Component Security Test Suite\npublic class ComponentSecurityTest {\n    \n    @Test\n    public void\
      \ testUnauthorizedActivityAccess() {\n        // Test that private activities cannot be launched externally\n      \
      \  Intent intent = new Intent();\n        intent.setClassName(\"com.yourapp\", \"com.yourapp.LoginActivity\");\n   \
      \     \n        try {\n            context.startActivity(intent);\n            fail(\"Private activity should not be\
      \ launchable externally\");\n        } catch (ActivityNotFoundException | SecurityException e) {\n            // Expected\
      \ behavior for properly secured component\n            assertTrue(\"Component properly secured\", true);\n        }\n\
      \    }\n    \n    @Test \n    public void testPermissionProtectedService() {\n        // Test service access with missing\
      \ permission\n        Intent serviceIntent = new Intent();\n        serviceIntent.setClassName(\"com.yourapp\", \"com.yourapp.InternalSyncService\"\
      );\n        \n        try {\n            context.bindService(serviceIntent, mockConnection, Context.BIND_AUTO_CREATE);\n\
      \            fail(\"Service should require signature permission\");\n        } catch (SecurityException e) {\n     \
      \       assertTrue(\"Service properly protected by permissions\", \n                e.getMessage().contains(\"permission\"\
      ));\n        }\n    }\n    \n    @Test\n    public void testIntentParameterValidation() {\n        // Test malicious\
      \ intent parameters\n        Intent maliciousIntent = new Intent();\n        maliciousIntent.setClassName(\"com.yourapp\"\
      , \"com.yourapp.SensitiveDataActivity\");\n        maliciousIntent.putExtra(\"user_id\", \"../../../etc/passwd\"); //\
      \ Path traversal\n        maliciousIntent.putExtra(\"action\", \"<script>alert('xss')</script>\"); // XSS attempt\n\
      \        maliciousIntent.putExtra(\"data_size\", Integer.MAX_VALUE); // DoS attempt\n        \n        // Launch activity\
      \ and verify it handles malicious input safely\n        ActivityScenario<SensitiveDataActivity> scenario = \n      \
      \      ActivityScenario.launch(maliciousIntent);\n        \n        scenario.onActivity(activity -> {\n            //\
      \ Verify activity properly validates and rejects malicious input\n            assertFalse(\"Activity should reject malicious\
      \ input\", \n                activity.isDataLoaded());\n        });\n    }\n    \n    @Test\n    public void testComponentExportNecessity()\
      \ {\n        // Validate that only necessary components are exported\n        PackageManager pm = context.getPackageManager();\n\
      \        \n        try {\n            PackageInfo packageInfo = pm.getPackageInfo(\n                context.getPackageName(),\
      \ \n                PackageManager.GET_ACTIVITIES | \n                PackageManager.GET_SERVICES | \n             \
      \   PackageManager.GET_RECEIVERS | \n                PackageManager.GET_PROVIDERS\n            );\n            \n  \
      \          // Check activities\n            if (packageInfo.activities != null) {\n                for (ActivityInfo\
      \ activity : packageInfo.activities) {\n                    if (activity.exported) {\n                        // Verify\
      \ each exported activity is necessary\n                        assertTrue(\"Activity \" + activity.name + \" should\
      \ have valid reason for export\",\n                            isComponentExportJustified(activity.name));\n       \
      \             }\n                }\n            }\n            \n            // Similar checks for services, receivers,\
      \ providers\n            validateExportedServices(packageInfo.services);\n            validateExportedReceivers(packageInfo.receivers);\n\
      \            validateExportedProviders(packageInfo.providers);\n            \n        } catch (PackageManager.NameNotFoundException\
      \ e) {\n            fail(\"Package not found during component analysis\");\n        }\n    }\n    \n    private boolean\
      \ isComponentExportJustified(String componentName) {\n        // Define justified exports (launcher activities, share\
      \ targets, etc.)\n        List<String> justifiedExports = Arrays.asList(\n            \"com.yourapp.MainActivity\",\
      \  // App launcher\n            \"com.yourapp.ShareActivity\", // Share target\n            \"com.yourapp.DeepLinkActivity\"\
      \ // Deep link handler\n        );\n        \n        return justifiedExports.contains(componentName);\n    }\n}\n\n\
      // Automated security validation script\n#!/bin/bash\necho \"Running Component Export Security Validation...\"\n\n#\
      \ Check for unnecessary exports using aapt\naapt dump xmltree app.apk AndroidManifest.xml | grep -A 5 -B 5 \"exported.*true\"\
      \ > exported_components.txt\n\n# Analyze each exported component\necho \"Exported Components Found:\"\ncat exported_components.txt\n\
      \n# Test component access from external app context\necho \"Testing unauthorized access attempts...\"\nadb shell am\
      \ start -n com.yourapp/.LoginActivity 2>&1 | grep \"Permission Denial\" && echo \"✓ Private activity properly protected\"\
      \n\n# Verify permission enforcement\nadb shell am start-service -n com.yourapp/.InternalSyncService 2>&1 | grep \"Permission\
      \ Denial\" && echo \"✓ Service permission properly enforced\"\n\necho \"Component security validation complete\""
    verification_method: Automated test execution and manual penetration testing to verify all security configurations
    estimated_hours: 2.5
    complexity: moderate
  code_examples:
    explicit_export_control: android:exported="false" // Explicitly disable external access
    permission_protection: android:permission="com.yourapp.permission.INTERNAL_ACCESS" // Signature-level protection
    intent_validation: if (!validateIntentSecurity(intent)) { finish(); return; } // Intent validation
    signature_verification: return Arrays.equals(callingSignatures, mySignatures); // Signature-based access control
  verification_checklist:
  - All components have explicit android:exported attribute values
  - No components are exported unnecessarily
  - All exported components have appropriate permission protection
  - Intent parameter validation implemented for all exported components
  - Signature-level permissions used for sensitive components
  - Component access testing validates security configurations
  - No implicit exports through unprotected intent filters
  - Calling package verification implemented where needed
  - Malicious intent handling tested and verified
  - Documentation updated with component security rationale
  best_practices:
  - Use android:exported="false" as the default for all components
  - Export components only when external access is functionally required
  - Implement signature-level permissions for inter-app communication
  - Validate all intent parameters with whitelist-based approaches
  - Use calling package verification for additional security layers
  - Implement logging for component access attempts
  - Regular security audits of exported components and permissions
  - Use custom permissions instead of built-in permissions when possible
  - Implement defense-in-depth with multiple security layers
  - Document the security rationale for each exported component
  prevention_measures:
  - Implement static analysis rules to detect unnecessary component exports
  - Automated testing for component security configurations
  - Code review requirements for any component export changes
  - Security-focused manifest analysis in CI/CD pipeline
  - Regular penetration testing of exported components
  - Developer training on Android component security
  - Establish component export approval process for new features
  - Monitor for suspicious component access in production
  - Implement runtime security monitoring for exported components
  - Regular security audits using automated tools and manual review
  references:
  - 'CWE-926: Improper Export of Android Application Components'
  - OWASP Mobile Security Testing Guide - Android Platform APIs
  - Android Security Documentation - Component Security
  - Android Manifest Permissions Documentation
  - Google Android Security Best Practices
  - NIST Mobile Application Security Guidelines
  - Android Intent Security Best Practices
  - Android Signature-Based Permissions Guide
path_traversal_remediation:
  fix_summary: Implement secure path validation and directory access controls to prevent path traversal attacks in {vuln_title}
  detailed_description: Path traversal vulnerabilities (CWE-22) occur when applications construct file paths using untrusted
    input without proper validation, allowing attackers to access files and directories outside the intended scope. This can
    lead to unauthorized file access, information disclosure, or even code execution. The fix involves implementing full
    path sanitization, whitelist-based directory controls, and secure file access patterns.
  root_cause_analysis: File paths are constructed using user-controlled input without proper validation, canonicalization,
    or boundary checking, allowing "../" sequences and absolute paths to escape intended directory restrictions.
  steps:
  - step_number: 1
    title: Implement Path Sanitization and Validation
    description: Create path sanitization functions to neutralize path traversal attack vectors and validate
      all file path inputs in {location}.
    code_example: "// Before (Vulnerable) - Direct path construction\npublic void loadFile(String fileName) {\n    File file\
      \ = new File(\"/app/data/\" + fileName);  // VULNERABLE to ../\n    FileInputStream fis = new FileInputStream(file);\n\
      \    // Process file...\n}\n\npublic void saveDocument(String path, byte[] data) {\n    File outputFile = new File(path);\
      \  // VULNERABLE to absolute paths\n    FileOutputStream fos = new FileOutputStream(outputFile);\n    // Save data...\n\
      }\n\n// After (Secure) - Path sanitization\npublic void loadFile(String fileName) {\n    // Step 1: Validate\
      \ and sanitize input\n    String sanitizedFileName = sanitizeFileName(fileName);\n    if (sanitizedFileName == null)\
      \ {\n        throw new SecurityException(\"Invalid file name: \" + fileName);\n    }\n    \n    // Step 2: Construct\
      \ secure path\n    File baseDir = new File(\"/app/data/\");\n    File file = new File(baseDir, sanitizedFileName);\n\
      \    \n    // Step 3: Validate final path is within bounds\n    if (!isWithinBounds(file, baseDir)) {\n        throw\
      \ new SecurityException(\"Path traversal attempt detected: \" + fileName);\n    }\n    \n    FileInputStream fis = new\
      \ FileInputStream(file);\n    // Process file...\n}\n\nprivate String sanitizeFileName(String fileName) {\n    if (fileName\
      \ == null || fileName.trim().isEmpty()) {\n        return null;\n    }\n    \n    // Remove dangerous characters and\
      \ sequences\n    String sanitized = fileName\n        .replace(\"../\", \"\")\n        .replace(\"..\\\\\", \"\")\n\
      \        .replace(\"/\", \"\")\n        .replace(\"\\\\\", \"\")\n        .replace(\":\", \"\")  // Windows drive letters\n\
      \        .replace(\"*\", \"\")\n        .replace(\"?\", \"\")\n        .replace(\"\\\"\", \"\")\n        .replace(\"\
      <\", \"\")\n        .replace(\">\", \"\")\n        .replace(\"|\", \"\")\n        .replace(\"\\0\", \"\"); // Null bytes\n\
      \    \n    // URL decode any encoded sequences\n    try {\n        sanitized = java.net.URLDecoder.decode(sanitized,\
      \ \"UTF-8\");\n        // Re-apply sanitization after decoding\n        sanitized = sanitized.replace(\"../\", \"\"\
      ).replace(\"..\\\\\", \"\");\n    } catch (UnsupportedEncodingException e) {\n        return null;\n    }\n    \n  \
      \  // Validate final result\n    if (sanitized.contains(\"..\") || sanitized.startsWith(\"/\") || sanitized.contains(\"\
      \\\\\")) {\n        return null;\n    }\n    \n    return sanitized;\n}\n\nprivate boolean isWithinBounds(File file,\
      \ File baseDirectory) {\n    try {\n        String canonicalFilePath = file.getCanonicalPath();\n        String canonicalBasePath\
      \ = baseDirectory.getCanonicalPath();\n        \n        // Ensure the file is within the base directory\n        return\
      \ canonicalFilePath.startsWith(canonicalBasePath + File.separator) ||\n               canonicalFilePath.equals(canonicalBasePath);\n\
      \    } catch (IOException e) {\n        // If we can't determine the canonical path, deny access\n        return false;\n\
      \    }\n}"
    verification_method: Unit testing with path traversal payloads to ensure all attack vectors are blocked
    estimated_hours: 2.5
    complexity: moderate
  - step_number: 2
    title: Implement Whitelist-Based Directory Access Controls
    description: Establish whitelist-based directory access controls with predefined safe directories and validate all file
      operations against allowed paths.
    code_example: "// Secure directory access control implementation\npublic class SecureFileManager {\n    private final\
      \ Set<String> allowedDirectories;\n    private final String basePath;\n    \n    public SecureFileManager(String basePath)\
      \ {\n        this.basePath = new File(basePath).getAbsolutePath();\n        this.allowedDirectories = initializeAllowedDirectories();\n\
      \    }\n    \n    private Set<String> initializeAllowedDirectories() {\n        Set<String> allowed = new HashSet<>();\n\
      \        try {\n            // Define allowed subdirectories\n            allowed.add(new File(basePath, \"documents\"\
      ).getCanonicalPath());\n            allowed.add(new File(basePath, \"images\").getCanonicalPath());\n            allowed.add(new\
      \ File(basePath, \"cache\").getCanonicalPath());\n            allowed.add(new File(basePath, \"temp\").getCanonicalPath());\n\
      \        } catch (IOException e) {\n            Log.e(TAG, \"Failed to initialize allowed directories\", e);\n     \
      \   }\n        return Collections.unmodifiableSet(allowed);\n    }\n    \n    public File getSecureFile(String relativePath,\
      \ String allowedDir) {\n        // Validate allowed directory\n        if (!isAllowedDirectory(allowedDir)) {\n    \
      \        throw new SecurityException(\"Access to directory not allowed: \" + allowedDir);\n        }\n        \n   \
      \     // Sanitize the relative path\n        String sanitizedPath = sanitizePath(relativePath);\n        if (sanitizedPath\
      \ == null) {\n            throw new SecurityException(\"Invalid path: \" + relativePath);\n        }\n        \n   \
      \     try {\n            // Construct the target file\n            File baseDir = new File(allowedDir);\n          \
      \  File targetFile = new File(baseDir, sanitizedPath);\n            String canonicalTargetPath = targetFile.getCanonicalPath();\n\
      \            String canonicalBasePath = baseDir.getCanonicalPath();\n            \n            // Verify the file is\
      \ within the allowed directory\n            if (!canonicalTargetPath.startsWith(canonicalBasePath + File.separator)\
      \ &&\n                !canonicalTargetPath.equals(canonicalBasePath)) {\n                throw new SecurityException(\"\
      Path traversal attempt: \" + relativePath);\n            }\n            \n            return targetFile;\n        }\
      \ catch (IOException e) {\n            throw new SecurityException(\"Invalid file path: \" + relativePath, e);\n   \
      \     }\n    }\n    \n    private boolean isAllowedDirectory(String directory) {\n        try {\n            String\
      \ canonicalDir = new File(directory).getCanonicalPath();\n            return allowedDirectories.contains(canonicalDir);\n\
      \        } catch (IOException e) {\n            return false;\n        }\n    }\n    \n    public List<File> listAllowedDirectories()\
      \ {\n        return allowedDirectories.stream()\n            .map(File::new)\n            .filter(File::exists)\n  \
      \          .filter(File::isDirectory)\n            .collect(Collectors.toList());\n    }\n    \n    // Secure file reading\
      \ with whitelist validation\n    public byte[] readFile(String relativePath, String allowedDir) throws IOException {\n\
      \        File secureFile = getSecureFile(relativePath, allowedDir);\n        \n        if (!secureFile.exists()) {\n\
      \            throw new FileNotFoundException(\"File not found: \" + relativePath);\n        }\n        \n        if\
      \ (!secureFile.isFile()) {\n            throw new IOException(\"Path is not a file: \" + relativePath);\n        }\n\
      \        \n        // Additional size check to prevent DoS\n        long fileSize = secureFile.length();\n        if\
      \ (fileSize > MAX_FILE_SIZE) {\n            throw new IOException(\"File too large: \" + fileSize + \" bytes\");\n \
      \       }\n        \n        return Files.readAllBytes(secureFile.toPath());\n    }\n}"
    verification_method: Directory traversal testing to verify whitelist enforcement and boundary validation
    estimated_hours: 3.0
    complexity: moderate
  - step_number: 3
    title: Implement Secure File Access Patterns
    description: Replace unsafe file access patterns with secure implementations that include proper canonicalization, boundary
      checking, and error handling.
    code_example: "// Before (Vulnerable) - Unsafe file operations\npublic class UnsafeFileHandler {\n    public void processFile(String\
      \ userFilePath) {\n        File file = new File(userFilePath);  // Direct user input\n        // Process file without\
      \ validation\n    }\n    \n    public void extractZip(String zipPath, String destDir) {\n        try (ZipInputStream\
      \ zis = new ZipInputStream(new FileInputStream(zipPath))) {\n            ZipEntry entry;\n            while ((entry\
      \ = zis.getNextEntry()) != null) {\n                File destFile = new File(destDir, entry.getName());  // ZIP slip\
      \ vulnerability\n                FileOutputStream fos = new FileOutputStream(destFile);\n                // Extract\
      \ without validation\n            }\n        }\n    }\n}\n\n// After (Secure) - Safe file access patterns\npublic class\
      \ SecureFileHandler {\n    private final SecureFileManager fileManager;\n    private static final long MAX_EXTRACT_SIZE\
      \ = 100 * 1024 * 1024; // 100MB\n    private static final int MAX_EXTRACT_COUNT = 1000;\n    \n    public SecureFileHandler(String\
      \ basePath) {\n        this.fileManager = new SecureFileManager(basePath);\n    }\n    \n    public void processFile(String\
      \ userFilePath, String allowedCategory) {\n        try {\n            // Get secure file reference with validation\n\
      \            File secureFile = fileManager.getSecureFile(userFilePath, \n                getValidatedDirectory(allowedCategory));\n\
      \            \n            // Additional file type validation\n            if (!isAllowedFileType(secureFile)) {\n \
      \               throw new SecurityException(\"File type not allowed: \" + userFilePath);\n            }\n          \
      \  \n            // Process with additional safety checks\n            processSecureFile(secureFile);\n            \n\
      \        } catch (SecurityException e) {\n            Log.w(TAG, \"File access denied: \" + userFilePath, e);\n    \
      \        throw e;\n        }\n    }\n    \n    public void extractZipSecurely(String zipPath, String destCategory) {\n\
      \        File destDir = new File(getValidatedDirectory(destCategory));\n        \n        try (ZipInputStream zis =\
      \ new ZipInputStream(new FileInputStream(zipPath))) {\n            ZipEntry entry;\n            long totalExtracted\
      \ = 0;\n            int fileCount = 0;\n            \n            while ((entry = zis.getNextEntry()) != null) {\n \
      \               // Validate entry name\n                String entryName = validateZipEntryName(entry.getName());\n\
      \                if (entryName == null) {\n                    Log.w(TAG, \"Skipping dangerous zip entry: \" + entry.getName());\n\
      \                    continue;\n                }\n                \n                // Prevent zip bomb\n         \
      \       if (++fileCount > MAX_EXTRACT_COUNT) {\n                    throw new SecurityException(\"Too many files in\
      \ zip archive\");\n                }\n                \n                if (totalExtracted + entry.getSize() > MAX_EXTRACT_SIZE)\
      \ {\n                    throw new SecurityException(\"Zip archive too large\");\n                }\n              \
      \  \n                // Secure file creation\n                File destFile = fileManager.getSecureFile(entryName, destDir.getAbsolutePath());\n\
      \                \n                // Create parent directories if needed\n                File parentDir = destFile.getParentFile();\n\
      \                if (parentDir != null && !parentDir.exists()) {\n                    if (!parentDir.mkdirs()) {\n \
      \                       throw new IOException(\"Failed to create directory: \" + parentDir);\n                    }\n\
      \                }\n                \n                // Extract with size limits\n                extractZipEntry(zis,\
      \ destFile, entry.getSize());\n                totalExtracted += entry.getSize();\n            }\n        } catch (IOException\
      \ e) {\n            throw new RuntimeException(\"Zip extraction failed\", e);\n        }\n    }\n    \n    private String\
      \ validateZipEntryName(String entryName) {\n        if (entryName == null || entryName.trim().isEmpty()) {\n       \
      \     return null;\n        }\n        \n        // Block path traversal in zip entries\n        if (entryName.contains(\"\
      ../\") || entryName.contains(\"..\\\\\") ||\n            entryName.startsWith(\"/\") || entryName.contains(\":\\\\\"\
      )) {\n            return null;\n        }\n        \n        // Block hidden files and system files\n        if (entryName.startsWith(\"\
      .\") || entryName.toLowerCase().startsWith(\"thumbs.db\")) {\n            return null;\n        }\n        \n      \
      \  return entryName;\n    }\n    \n    private void extractZipEntry(ZipInputStream zis, File destFile, long expectedSize)\
      \ throws IOException {\n        try (FileOutputStream fos = new FileOutputStream(destFile)) {\n            byte[] buffer\
      \ = new byte[8192];\n            long totalRead = 0;\n            int bytesRead;\n            \n            while ((bytesRead\
      \ = zis.read(buffer)) != -1) {\n                totalRead += bytesRead;\n                if (totalRead > expectedSize\
      \ * 2) { // Allow some variance\n                    throw new SecurityException(\"Zip entry larger than expected\"\
      );\n                }\n                fos.write(buffer, 0, bytesRead);\n            }\n        }\n    }\n}"
