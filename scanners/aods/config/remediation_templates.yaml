privacy_leak_remediation:
  fix_summary: Implement privacy protection and data sanitization to prevent privacy leaks in {vuln_title}
  detailed_description: Privacy leaks occur when sensitive personal information (PII), debug data, or tracking information
    is unintentionally exposed through logging, analytics, data storage, or network transmission. This encompasses GDPR/CCPA
    compliance violations, insecure logging practices, and unauthorized data collection. The fix involves implementing data
    minimization, secure logging, analytics configuration, and privacy-by-design principles.
  root_cause_analysis: Sensitive personal information, debug data, or user activity is being collected, logged, stored, or
    transmitted without proper privacy controls, user consent, or data protection measures, potentially violating privacy
    regulations and exposing user data.
  steps:
  - step_number: 1
    title: Implement Secure Logging and Debug Information Controls
    description: Remove sensitive data from all logging statements and implement secure logging practices with proper log
      sanitization in {location}.
    code_example: "// Before (Vulnerable) - Logging sensitive information\npublic class UserManager {\n    private static\
      \ final String TAG = \"UserManager\";\n    \n    public boolean authenticateUser(String email, String password) {\n\
      \        Log.d(TAG, \"Authenticating user: \" + email + \" with password: \" + password);  // VULNERABLE\n        Log.i(TAG,\
      \ \"User data: \" + userObject.toString());  // May contain sensitive info\n        System.out.println(\"Auth attempt:\
      \ \" + email + \":\" + password);  // VULNERABLE\n        \n        // Debug information exposure\n        Log.e(TAG,\
      \ \"Authentication failed\", exception);  // May expose internal details\n        \n        return authenticate(email,\
      \ password);\n    }\n}\n\n// After (Secure) - Privacy-safe logging with data sanitization\npublic class UserManager\
      \ {\n    private static final String TAG = \"UserManager\";\n    private static final boolean DEBUG = BuildConfig.DEBUG;\n\
      \    \n    public boolean authenticateUser(String email, String password) {\n        // Only log minimal non-sensitive\
      \ information\n        if (DEBUG && Log.isLoggable(TAG, Log.DEBUG)) {\n            Log.d(TAG, \"Authenticating user:\
      \ \" + sanitizeEmail(email));  // Sanitized email\n        }\n        \n        // Production logging without sensitive\
      \ data\n        Log.i(TAG, \"Authentication attempt for user ID: \" + generateUserHash(email));\n        \n        try\
      \ {\n            return authenticate(email, password);\n        } catch (AuthenticationException e) {\n            //\
      \ Safe error logging without sensitive details\n            Log.w(TAG, \"Authentication failed: \" + e.getErrorCode());\n\
      \            return false;\n        }\n    }\n    \n    private String sanitizeEmail(String email) {\n        if (email\
      \ == null || email.length() < 3) return \"***\";\n        int atIndex = email.indexOf('@');\n        if (atIndex > 0)\
      \ {\n            return email.substring(0, 2) + \"***\" + email.substring(atIndex);\n        }\n        return email.substring(0,\
      \ 2) + \"***\";\n    }\n    \n    private String generateUserHash(String email) {\n        return \"user_\" + Math.abs(email.hashCode());\n\
      \    }\n}\n\n// Secure logging configuration\npublic class SecureLogger {\n    private static final Set<String> SENSITIVE_KEYWORDS\
      \ = Set.of(\n        \"password\", \"token\", \"key\", \"secret\", \"pin\", \"ssn\", \"credit\", \"account\"\n    );\n\
      \    \n    public static void secureLog(String tag, String message) {\n        String sanitizedMessage = sanitizeLogMessage(message);\n\
      \        if (BuildConfig.DEBUG) {\n            Log.d(tag, sanitizedMessage);\n        }\n    }\n    \n    private static\
      \ String sanitizeLogMessage(String message) {\n        String lowercaseMessage = message.toLowerCase();\n        for\
      \ (String keyword : SENSITIVE_KEYWORDS) {\n            if (lowercaseMessage.contains(keyword)) {\n                return\
      \ \"[REDACTED - Contains sensitive information]\";\n            }\n        }\n        return message;\n    }\n}"
    verification_method: Code review and log analysis to ensure no sensitive data in production logs
    estimated_hours: 3.0
    complexity: moderate
  - step_number: 2
    title: Implement PII Detection and Data Minimization
    description: Add automated PII detection and implement data minimization practices to collect only necessary user information.
    code_example: "// PII Detection and Data Minimization Implementation\npublic class PIIProtectionManager {\n    private\
      \ static final Pattern EMAIL_PATTERN = Pattern.compile(\n        \"\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\\
      b\"\n    );\n    private static final Pattern PHONE_PATTERN = Pattern.compile(\n        \"\\b\\+?1?[-\\s\\.]?\\(?\\\
      d{3}\\)?[-\\s\\.]?\\d{3}[-\\s\\.]?\\d{4}\\b\"\n    );\n    private static final Pattern CREDIT_CARD_PATTERN = Pattern.compile(\n\
      \        \"\\b\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b\"\n    );\n    \n    public static class PIIValidationResult\
      \ {\n        public final boolean containsPII;\n        public final List<String> piiTypes;\n        public final String\
      \ sanitizedData;\n        \n        public PIIValidationResult(boolean containsPII, List<String> piiTypes, String sanitizedData)\
      \ {\n            this.containsPII = containsPII;\n            this.piiTypes = piiTypes;\n            this.sanitizedData\
      \ = sanitizedData;\n        }\n    }\n    \n    public static PIIValidationResult validateAndSanitize(String data) {\n\
      \        List<String> piiTypes = new ArrayList<>();\n        String sanitized = data;\n        boolean containsPII =\
      \ false;\n        \n        // Check for email addresses\n        if (EMAIL_PATTERN.matcher(data).find()) {\n      \
      \      piiTypes.add(\"EMAIL\");\n            sanitized = EMAIL_PATTERN.matcher(sanitized).replaceAll(\"[EMAIL_REDACTED]\"\
      );\n            containsPII = true;\n        }\n        \n        // Check for phone numbers\n        if (PHONE_PATTERN.matcher(data).find())\
      \ {\n            piiTypes.add(\"PHONE\");\n            sanitized = PHONE_PATTERN.matcher(sanitized).replaceAll(\"[PHONE_REDACTED]\"\
      );\n            containsPII = true;\n        }\n        \n        // Check for credit card numbers\n        if (CREDIT_CARD_PATTERN.matcher(data).find())\
      \ {\n            piiTypes.add(\"CREDIT_CARD\");\n            sanitized = CREDIT_CARD_PATTERN.matcher(sanitized).replaceAll(\"\
      [CARD_REDACTED]\");\n            containsPII = true;\n        }\n        \n        return new PIIValidationResult(containsPII,\
      \ piiTypes, sanitized);\n    }\n    \n    // Data minimization for user profiles\n    public static UserProfile minimizeUserData(UserProfile\
      \ fullProfile, String purpose) {\n        UserProfile.Builder builder = new UserProfile.Builder();\n        \n     \
      \   switch (purpose) {\n            case \"AUTHENTICATION\":\n                // Only include data needed for auth\n\
      \                builder.setUserId(fullProfile.getUserId())\n                       .setHashedPassword(fullProfile.getHashedPassword());\n\
      \                break;\n                \n            case \"ANALYTICS\":\n                // Only include non-PII\
      \ analytics data\n                builder.setUserId(hashUserId(fullProfile.getUserId()))\n                       .setDeviceType(fullProfile.getDeviceType())\n\
      \                       .setAppVersion(fullProfile.getAppVersion());\n                break;\n                \n   \
      \         case \"MARKETING\":\n                // Include only consented data\n                if (fullProfile.hasMarketingConsent())\
      \ {\n                    builder.setUserId(hashUserId(fullProfile.getUserId()))\n                           .setPreferences(fullProfile.getPreferences());\n\
      \                }\n                break;\n        }\n        \n        return builder.build();\n    }\n    \n    private\
      \ static String hashUserId(String userId) {\n        return \"user_\" + Math.abs(userId.hashCode());\n    }\n}"
    verification_method: Automated testing with PII detection tools and data flow analysis
    estimated_hours: 4.0
    complexity: complex
  - step_number: 3
    title: Configure Privacy-Safe Analytics and Tracking
    description: Implement privacy-compliant analytics configuration with user consent management and data anonymization.
    code_example: "// Privacy-Compliant Analytics Implementation\npublic class PrivacyCompliantAnalytics {\n    private FirebaseAnalytics\
      \ firebaseAnalytics;\n    private ConsentManager consentManager;\n    \n    public PrivacyCompliantAnalytics(Context\
      \ context) {\n        this.firebaseAnalytics = FirebaseAnalytics.getInstance(context);\n        this.consentManager\
      \ = new ConsentManager(context);\n        \n        // Configure analytics for privacy\n        configurePrivacySettings();\n\
      \    }\n    \n    private void configurePrivacySettings() {\n        // Disable automatic data collection until consent\n\
      \        firebaseAnalytics.setAnalyticsCollectionEnabled(false);\n        \n        // Configure data retention (GDPR\
      \ requirement - max 26 months)\n        Bundle analyticsConfig = new Bundle();\n        analyticsConfig.putString(\"\
      data_retention\", \"14_months\");\n        firebaseAnalytics.setDefaultEventParameters(analyticsConfig);\n        \n\
      \        // Disable advertising ID collection initially\n        firebaseAnalytics.setUserId(null);\n        firebaseAnalytics.resetAnalyticsData();\n\
      \    }\n    \n    public void enableAnalyticsWithConsent() {\n        if (consentManager.hasAnalyticsConsent()) {\n\
      \            firebaseAnalytics.setAnalyticsCollectionEnabled(true);\n            \n            // Set privacy-safe user\
      \ properties\n            firebaseAnalytics.setUserProperty(\"user_type\", \"consented\");\n            firebaseAnalytics.setUserProperty(\"\
      consent_version\", consentManager.getConsentVersion());\n            \n            // Use hashed user ID instead of\
      \ raw user ID\n            String hashedUserId = generateHashedUserId();\n            firebaseAnalytics.setUserId(hashedUserId);\n\
      \        }\n    }\n    \n    public void trackEventWithPrivacy(String eventName, Map<String, Object> parameters) {\n\
      \        if (!consentManager.hasAnalyticsConsent()) {\n            return;  // Don't track if no consent\n        }\n\
      \        \n        Bundle bundle = new Bundle();\n        \n        // Sanitize and validate parameters\n        for\
      \ (Map.Entry<String, Object> entry : parameters.entrySet()) {\n            String key = entry.getKey();\n          \
      \  Object value = entry.getValue();\n            \n            // Ensure no PII in event parameters\n            PIIValidationResult\
      \ validation = PIIProtectionManager.validateAndSanitize(value.toString());\n            \n            if (validation.containsPII)\
      \ {\n                Log.w(\"Analytics\", \"PII detected in analytics parameter: \" + key);\n                continue;\
      \  // Skip PII parameters\n            }\n            \n            bundle.putString(key, value.toString());\n     \
      \   }\n        \n        firebaseAnalytics.logEvent(eventName, bundle);\n    }\n    \n    private String generateHashedUserId()\
      \ {\n        String userId = UserManager.getCurrentUserId();\n        if (userId != null) {\n            return \"user_\"\
      \ + Math.abs(userId.hashCode());\n        }\n        return null;\n    }\n    \n    // GDPR Right to be Forgotten implementation\n\
      \    public void deleteUserData(String userId) {\n        // Reset analytics data for the user\n        firebaseAnalytics.resetAnalyticsData();\n\
      \        \n        // Clear local stored analytics data\n        SharedPreferences prefs = context.getSharedPreferences(\"\
      analytics_data\", Context.MODE_PRIVATE);\n        prefs.edit().clear().apply();\n        \n        // Request server-side\
      \ data deletion\n        requestServerDataDeletion(userId);\n    }\n}\n\n// Consent Management for Privacy Compliance\n\
      public class ConsentManager {\n    private SharedPreferences prefs;\n    private static final String ANALYTICS_CONSENT_KEY\
      \ = \"analytics_consent\";\n    private static final String MARKETING_CONSENT_KEY = \"marketing_consent\";\n    private\
      \ static final String CONSENT_VERSION_KEY = \"consent_version\";\n    \n    public ConsentManager(Context context) {\n\
      \        this.prefs = context.getSharedPreferences(\"privacy_consent\", Context.MODE_PRIVATE);\n    }\n    \n    public\
      \ boolean hasAnalyticsConsent() {\n        return prefs.getBoolean(ANALYTICS_CONSENT_KEY, false);\n    }\n    \n   \
      \ public void setAnalyticsConsent(boolean consent) {\n        prefs.edit()\n             .putBoolean(ANALYTICS_CONSENT_KEY,\
      \ consent)\n             .putString(CONSENT_VERSION_KEY, \"v1.0\")\n             .putLong(\"consent_timestamp\", System.currentTimeMillis())\n\
      \             .apply();\n    }\n    \n    public String getConsentVersion() {\n        return prefs.getString(CONSENT_VERSION_KEY,\
      \ \"none\");\n    }\n}"
    verification_method: Privacy audit and consent flow testing with GDPR compliance validation
    estimated_hours: 4.5
    complexity: complex
  - step_number: 4
    title: Implement Data Storage Privacy Controls
    description: Secure sensitive data storage with encryption, access controls, and privacy-safe data handling practices.
    code_example: "// Privacy-Safe Data Storage Implementation\npublic class PrivacySecureStorage {\n    private static final\
      \ String ENCRYPTED_PREFS = \"encrypted_user_data\";\n    private static final String NON_PII_PREFS = \"app_settings\"\
      ;\n    \n    private EncryptedSharedPreferences encryptedPrefs;\n    private SharedPreferences regularPrefs;\n    \n\
      \    public PrivacySecureStorage(Context context) {\n        try {\n            // Initialize encrypted storage for\
      \ sensitive data\n            MasterKeys.AliasSpec keyGenParameterSpec = MasterKeys.AES256_GCM_SPEC;\n            String\
      \ masterKeyAlias = MasterKeys.getOrCreate(keyGenParameterSpec);\n            \n            encryptedPrefs = (EncryptedSharedPreferences)\
      \ EncryptedSharedPreferences.create(\n                ENCRYPTED_PREFS,\n                masterKeyAlias,\n          \
      \      context,\n                EncryptedSharedPreferences.PrefKeyEncryptionScheme.AES256_SIV,\n                EncryptedSharedPreferences.PrefValueEncryptionScheme.AES256_GCM\n\
      \            );\n            \n            // Regular storage for non-sensitive data\n            regularPrefs = context.getSharedPreferences(NON_PII_PREFS,\
      \ Context.MODE_PRIVATE);\n            \n        } catch (Exception e) {\n            Log.e(\"Storage\", \"Failed to\
      \ initialize encrypted storage\", e);\n        }\n    }\n    \n    // Secure storage with PII classification\n    public\
      \ void storeData(String key, String value, boolean isPII) {\n        // Validate for PII content regardless of isPII\
      \ flag\n        PIIValidationResult validation = PIIProtectionManager.validateAndSanitize(value);\n        \n      \
      \  if (validation.containsPII || isPII) {\n            // Store in encrypted preferences\n            if (encryptedPrefs\
      \ != null) {\n                encryptedPrefs.edit().putString(key, value).apply();\n                Log.d(\"Storage\"\
      , \"Sensitive data stored securely for key: \" + key);\n            } else {\n                Log.e(\"Storage\", \"\
      Cannot store sensitive data - encrypted storage not available\");\n            }\n        } else {\n            // Store\
      \ in regular preferences\n            regularPrefs.edit().putString(key, value).apply();\n        }\n    }\n    \n \
      \   public String retrieveData(String key, boolean isPII) {\n        if (isPII && encryptedPrefs != null) {\n      \
      \      return encryptedPrefs.getString(key, null);\n        } else {\n            return regularPrefs.getString(key,\
      \ null);\n        }\n    }\n    \n    // Privacy-compliant data deletion\n    public void deleteUserData(String userId)\
      \ {\n        // Clear all encrypted data\n        if (encryptedPrefs != null) {\n            encryptedPrefs.edit().clear().apply();\n\
      \        }\n        \n        // Clear only user-specific data from regular storage\n        SharedPreferences.Editor\
      \ editor = regularPrefs.edit();\n        Map<String, ?> allEntries = regularPrefs.getAll();\n        \n        for (String\
      \ key : allEntries.keySet()) {\n            if (key.contains(userId) || key.startsWith(\"user_\")) {\n             \
      \   editor.remove(key);\n            }\n        }\n        editor.apply();\n        \n        Log.i(\"Storage\", \"\
      User data deleted for privacy compliance\");\n    }\n    \n    // Database privacy controls\n    public static class\
      \ PrivacySecureDatabase {\n        public void createUserTable() {\n            String createTable = \"CREATE TABLE\
      \ users (\" +\n                \"id INTEGER PRIMARY KEY AUTOINCREMENT, \" +\n                \"user_hash TEXT NOT NULL,\
      \ \" +  // Store hash instead of user ID\n                \"preferences TEXT, \" +\n                \"created_at TIMESTAMP\
      \ DEFAULT CURRENT_TIMESTAMP\" +\n                \")\";\n            // Don't store PII directly in database\n     \
      \   }\n        \n        public void insertUserData(String userId, String preferences) {\n            // Hash the user\
      \ ID before storing\n            String userHash = generateUserHash(userId);\n            \n            // Validate\
      \ preferences for PII\n            PIIValidationResult validation = PIIProtectionManager.validateAndSanitize(preferences);\n\
      \            \n            if (validation.containsPII) {\n                Log.w(\"Database\", \"PII detected in preferences,\
      \ using sanitized version\");\n                preferences = validation.sanitizedData;\n            }\n            \n\
      \            // Insert using prepared statement\n            String sql = \"INSERT INTO users (user_hash, preferences)\
      \ VALUES (?, ?)\";\n            // Use parameterized query to prevent injection\n        }\n        \n        private\
      \ String generateUserHash(String userId) {\n            return \"user_\" + Math.abs(userId.hashCode());\n        }\n\
      \    }\n}"
    verification_method: Data storage audit and encryption validation testing
    estimated_hours: 3.5
    complexity: complex
