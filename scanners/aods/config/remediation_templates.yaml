      ,\n            \"..;/..;/..;/etc/passwd\",\n            \"~/../../etc/passwd\"\n        };\n        \n        for (String\
      \ payload : traversalPayloads) {\n            try {\n                File result = fileManager.getSecureFile(payload,\
