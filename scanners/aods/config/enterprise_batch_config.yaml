# AODS Enterprise Batch Processing Configuration
# Phase 13: Enterprise-ready batch analysis configuration

# Batch operation type
operation: "security_analysis"  # security_analysis, vulnerability_scan, compliance_audit, performance_benchmark

# Output configuration
output_directory: "./enterprise_results"
report_formats:
  - "json"
  - "html" 
  - "pdf"

# Target definitions
targets:
  # High priority mobile apps
  - target_id: "mobile_app_prod"
    target_path: "/apps/production/mobile_app.apk"
    target_type: "apk"
    priority: 1
    metadata:
      environment: "production"
      app_version: "2.1.0"
      compliance_required: true
  
  - target_id: "mobile_app_staging"
    target_path: "/apps/staging/mobile_app_staging.apk"
    target_type: "apk"
    priority: 2
    metadata:
      environment: "staging"
      app_version: "2.2.0-beta"
      compliance_required: false

  # Directory-based analysis
  - target_id: "source_code_audit"
    target_path: "/source/mobile_app_source/"
    target_type: "directory"
    priority: 2
    metadata:
      analysis_type: "source_code"
      language: "java_kotlin"

  # Web application analysis
  - target_id: "web_app_api"
    target_path: "https://api.example.com"
    target_type: "url"
    priority: 3
    metadata:
      endpoint_type: "api"
      auth_required: true

# Processing configuration
enable_parallel_processing: true
max_concurrent_analyses: 4
timeout_minutes: 90
retry_attempts: 3

# AODS Framework Integration
enable_ml_enhancement: true
enable_analytics_tracking: true
enable_performance_monitoring: true
enable_webview_analysis: true

# Enterprise features
enable_real_time_updates: true
notification_endpoints:
  - "slack://security-team-channel"
  - "email://security@company.com"

report_distribution:
  - "/shared/security_reports/"
  - "s3://security-reports-bucket/"

# Resource management
memory_limit_gb: 8.0
cpu_limit_percent: 80
disk_space_limit_gb: 50.0

# Compliance and audit
audit_logging: true
compliance_frameworks:
  - "OWASP_MASVS"
  - "NIST_Cybersecurity"
  - "ISO_27001"

# Advanced settings
advanced_settings:
  enable_deep_analysis: true
  enable_behavioral_analysis: true
  vulnerability_detection_accuracy: true
  zero_false_negatives: true
  preserve_borderline_findings: true
