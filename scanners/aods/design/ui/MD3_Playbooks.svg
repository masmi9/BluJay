<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
  <title>AODS — Playbooks (Dark, MD3)</title>
  <desc>Dark theme Playbooks screen with library and builder.</desc>
  <rect width="1440" height="1024" fill="#0b0c0f" />
  <!-- App bar -->
  <g>
    <rect x="0" y="0" width="1440" height="64" fill="#111318"/>
    <text x="60" y="38" font-family="Inter, Roboto, Arial" font-size="18" fill="#e3e6eb" font-weight="700">AODS</text>
    <text x="120" y="38" font-family="Inter, Roboto, Arial" font-size="16" fill="#aeb4bf">Playbooks</text>
    <rect x="1248" y="16" rx="10" ry="10" width="96" height="32" fill="#1e3a8a"/>
    <text x="1271" y="36" font-family="Inter, Roboto, Arial" font-size="12" fill="#fff" font-weight="600">New flow</text>
  </g>
  <!-- Nav drawer -->
  <g>
    <rect x="0" y="64" width="264" height="960" fill="#0f1116"/>
    <line x1="264" y1="64" x2="264" y2="1024" stroke="#1a1d24"/>
    <text x="24" y="112" font-family="Inter, Roboto, Arial" font-size="12" fill="#aeb4bf">LIBRARY</text>
    <rect x="16" y="128" width="232" height="40" rx="10" fill="#1e3a8a"/>
    <text x="32" y="154" font-family="Inter, Roboto, Arial" font-size="13" fill="#fff" font-weight="600">Standard remediation</text>
    <rect x="16" y="176" width="232" height="40" rx="10" fill="#141821"/>
    <text x="32" y="202" font-family="Inter, Roboto, Arial" font-size="13" fill="#e3e6eb">Weekly report</text>
  </g>
  <!-- Builder -->
  <g transform="translate(296,96)">
    <text x="0" y="0" font-family="Inter, Roboto, Arial" font-size="20" fill="#e3e6eb" font-weight="700">Playbook builder</text>
    <g transform="translate(0,28)">
      <rect x="0" y="16" width="816" height="480" rx="16" fill="#111318" stroke="#1a1d24"/>
      <text x="20" y="44" font-family="Inter, Roboto, Arial" font-size="12" fill="#aeb4bf">Drag steps here</text>
      <g transform="translate(20,64)">
        <rect x="0" y="0" width="160" height="56" rx="12" fill="#141821" stroke="#22262f"/>
        <text x="16" y="34" font-family="Inter, Roboto, Arial" font-size="12" fill="#c7ccd6">Create Jira ticket</text>
        <rect x="184" y="0" width="160" height="56" rx="12" fill="#141821" stroke="#22262f"/>
        <text x="200" y="34" font-family="Inter, Roboto, Arial" font-size="12" fill="#c7ccd6">Notify Slack channel</text>
        <rect x="368" y="0" width="160" height="56" rx="12" fill="#141821" stroke="#22262f"/>
        <text x="384" y="34" font-family="Inter, Roboto, Arial" font-size="12" fill="#c7ccd6">Assign owner</text>
      </g>
    </g>
  </g>
</svg>