<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
  <title>AODS — Admin Console (Dark, MD3)</title>
  <desc>Dark theme Admin Console with users table and invite button.</desc>
  <rect width="1440" height="1024" fill="#0b0c0f" />
  <!-- App bar -->
  <g>
    <rect x="0" y="0" width="1440" height="64" fill="#111318"/>
    <text x="60" y="38" font-family="Inter, Roboto, Arial" font-size="18" fill="#e3e6eb" font-weight="700">AODS</text>
    <text x="120" y="38" font-family="Inter, Roboto, Arial" font-size="16" fill="#aeb4bf">Admin Console</text>
    <rect x="1248" y="16" rx="10" ry="10" width="80" height="32" fill="#1e3a8a"/>
    <text x="1266" y="36" font-family="Inter, Roboto, Arial" font-size="12" fill="#fff" font-weight="600">Invite</text>
  </g>
  <!-- Nav drawer -->
  <g>
    <rect x="0" y="64" width="264" height="960" fill="#0f1116"/>
    <line x1="264" y1="64" x2="264" y2="1024" stroke="#1a1d24"/>
    <text x="24" y="112" font-family="Inter, Roboto, Arial" font-size="12" fill="#aeb4bf">ADMIN</text>
    <rect x="16" y="128" width="232" height="40" rx="10" fill="#1e3a8a"/>
    <text x="32" y="154" font-family="Inter, Roboto, Arial" font-size="13" fill="#ffffff" font-weight="600">Users</text>
    <rect x="16" y="176" width="232" height="40" rx="10" fill="#141821"/>
    <text x="32" y="202" font-family="Inter, Roboto, Arial" font-size="13" fill="#e3e6eb">Roles</text>
  </g>
  <!-- Content -->
  <g transform="translate(296,96)">
    <text x="0" y="0" font-family="Inter, Roboto, Arial" font-size="20" fill="#e3e6eb" font-weight="700">Users</text>
    <g transform="translate(0,28)">
      <rect x="0" y="16" width="1048" height="560" rx="16" fill="#111318" stroke="#1a1d24"/>
      <g transform="translate(20,24)">
        <text x="0" y="0" font-family="Inter, Roboto, Arial" font-size="12" fill="#aeb4bf">EMAIL</text>
        <text x="380" y="0" font-family="Inter, Roboto, Arial" font-size="12" fill="#aeb4bf">ROLE</text>
        <text x="520" y="0" font-family="Inter, Roboto, Arial" font-size="12" fill="#aeb4bf">STATUS</text>
      </g>
      <g transform="translate(20,40)">
        <rect x="0" y="0" width="1008" height="44" rx="10" fill="#141821"/>
        <text x="12" y="28" font-family="Inter, Roboto, Arial" font-size="12" fill="#d6dbe3">alice@acme</text>
        <text x="380" y="28" font-family="Inter, Roboto, Arial" font-size="12" fill="#d6dbe3">Admin</text>
        <rect x="520" y="10" width="84" height="24" rx="8" fill="#173015"/>
        <text x="540" y="26" font-family="Inter, Roboto, Arial" font-size="11" fill="#8bd17c" font-weight="600">Active</text>
      </g>
      <g transform="translate(20,92)">
        <rect x="0" y="0" width="1008" height="44" rx="10" fill="#111318" stroke="#1a1d24"/>
        <text x="12" y="28" font-family="Inter, Roboto, Arial" font-size="12" fill="#d6dbe3">bob@acme</text>
        <text x="380" y="28" font-family="Inter, Roboto, Arial" font-size="12" fill="#d6dbe3">Viewer</text>
        <rect x="520" y="10" width="84" height="24" rx="8" fill="#3a1212"/>
        <text x="538" y="26" font-family="Inter, Roboto, Arial" font-size="11" fill="#f1a2a2" font-weight="600">Pending</text>
      </g>
    </g>
  </g>
</svg>