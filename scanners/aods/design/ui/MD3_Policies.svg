<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
  <defs>
    <style>
      .bg { fill: #0b0c0f; }
      .surface { fill: #111318; }
      .outline { stroke: #1a1d24; stroke-width: 1; }
      .text { fill: #e3e6eb; font-family: 'Inter', 'Roboto', Arial, sans-serif; }
      .muted { fill: #aeb4bf; font-family: 'Inter', 'Roboto', Arial, sans-serif; }
      .accent { fill: #86b6ff; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="1024"/>
  <g>
    <rect class="surface outline" x="0" y="0" width="1440" height="64"/>
    <text class="text" x="88" y="40" font-size="18" font-weight="600">AODS — Policies</text>
  </g>
  <g>
    <rect class="surface outline" x="0" y="64" width="240" height="960"/>
  </g>
  <g>
    <rect class="surface outline" x="256" y="88" width="1152" height="848" rx="16"/>
    <text class="muted" x="280" y="116" font-size="14" font-weight="600">Policies</text>
    <g>
      <rect x="280" y="140" width="1088" height="56" rx="10" fill="#0f1116" stroke="#22262f"/>
      <text class="text" x="296" y="172" font-size="12">Block release if High findings > 0</text>
      <rect x="1240" y="152" width="56" height="28" rx="14" fill="#1f2a3a"/>
      <text class="text" x="1258" y="170" font-size="12">On</text>
    </g>
    <g>
      <rect x="280" y="200" width="1088" height="56" rx="10" fill="#0b0d12" stroke="#22262f"/>
      <text class="text" x="296" y="232" font-size="12">Warn if Medium findings > 10</text>
      <rect x="1240" y="212" width="56" height="28" rx="14" fill="#2a2f3a"/>
      <text class="muted" x="1254" y="230" font-size="12">Off</text>
    </g>
  </g>
</svg>