<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <title>AODS — Scans (Mobile 375×812, MD3)</title>
  <desc>Responsive mobile variant for the Scans list with bottom app bar actions and cards.</desc>
  <defs>
    <filter id="elev1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="375" height="812" fill="#0b0c0f"/>

  <!-- Top app bar -->
  <g>
    <rect x="0" y="0" width="375" height="56" fill="#111318"/>
    <text x="16" y="34" font-family="Inter, Roboto, Arial" font-size="16" font-weight="600" fill="#e3e6eb">Scans</text>
    <circle cx="347" cy="28" r="12" fill="#1e3a8a"/>
  </g>

  <!-- Cards list -->
  <g transform="translate(16,72)">
    <g>
      <rect x="0" y="0" width="343" height="96" rx="14" fill="#151923" stroke="#22262f"/>
      <text x="16" y="26" font-family="Inter, Roboto" font-size="13" fill="#d6dbe3" font-weight="600">app-prod — OWASP Full</text>
      <text x="16" y="48" font-family="Inter, Roboto" font-size="12" fill="#aeb4bf">Duration 18m • 2d ago</text>
      <rect x="259" y="60" rx="8" ry="8" width="68" height="24" fill="#173015" stroke="#285522"/>
      <text x="277" y="76" font-family="Inter, Roboto" font-size="11" fill="#8bd17c" font-weight="600">PASS</text>
    </g>
    <g transform="translate(0,112)">
      <rect x="0" y="0" width="343" height="96" rx="14" fill="#151923" stroke="#22262f"/>
      <text x="16" y="26" font-family="Inter, Roboto" font-size="13" fill="#d6dbe3" font-weight="600">api-staging — Delta</text>
      <text x="16" y="48" font-family="Inter, Roboto" font-size="12" fill="#aeb4bf">Duration 7m • 3h ago</text>
      <rect x="259" y="60" rx="8" ry="8" width="68" height="24" fill="#3a1212" stroke="#5e2323"/>
      <text x="279" y="76" font-family="Inter, Roboto" font-size="11" fill="#f1a2a2" font-weight="600">FAIL</text>
    </g>
    <g transform="translate(0,224)">
      <rect x="0" y="0" width="343" height="96" rx="14" fill="#151923" stroke="#22262f"/>
      <text x="16" y="26" font-family="Inter, Roboto" font-size="13" fill="#d6dbe3" font-weight="600">web-dev — OWASP Full</text>
      <text x="16" y="48" font-family="Inter, Roboto" font-size="12" fill="#aeb4bf">Duration 22m • now</text>
      <rect x="259" y="60" rx="8" ry="8" width="68" height="24" fill="#3a2712" stroke="#6b4a1d"/>
      <text x="264" y="76" font-family="Inter, Roboto" font-size="11" fill="#f9d7a9" font-weight="600">RUNNING</text>
    </g>
  </g>

  <!-- Bottom app bar -->
  <g>
    <rect x="0" y="732" width="375" height="80" fill="#111318"/>
    <g transform="translate(24,748)">
      <rect x="0" y="0" width="80" height="48" rx="12" fill="#1a1f2b"/>
      <text x="16" y="30" font-family="Inter, Roboto" font-size="12" fill="#c1c7d0">Dashboard</text>
    </g>
    <g transform="translate(148,748)">
      <rect x="0" y="0" width="80" height="48" rx="12" fill="#1e3a8a"/>
      <text x="22" y="30" font-family="Inter, Roboto" font-size="12" fill="#ffffff" font-weight="600">Scans</text>
    </g>
    <g transform="translate(272,748)">
      <rect x="0" y="0" width="80" height="48" rx="12" fill="#1a1f2b"/>
      <text x="18" y="30" font-family="Inter, Roboto" font-size="12" fill="#c1c7d0">Reports</text>
    </g>
  </g>
</svg>