<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
  <defs>
    <style>
      .bg { fill: #0b0c0f; }
      .surface { fill: #111318; }
      .outline { stroke: #1a1d24; stroke-width: 1; }
      .text { fill: #e3e6eb; font-family: 'Inter', 'Roboto', Arial, sans-serif; }
      .muted { fill: #aeb4bf; font-family: 'Inter', 'Roboto', Arial, sans-serif; }
      .accent { fill: #86b6ff; }
      .chip { fill: #1a2332; }
      .card { fill: #0f1116; }
      .h1 { font-size: 18px; font-weight: 600; }
      .h2 { font-size: 14px; font-weight: 600; }
      .body { font-size: 12px; }
      .mono { font-family: 'Roboto Mono', monospace; }
      .elev { filter: drop-shadow(0 1px 1px rgba(0,0,0,0.4)); }
    </style>
  </defs>
  <rect class="bg" width="1440" height="1024"/>
  <!-- App bar -->
  <g class="elev">
    <rect class="surface outline" x="0" y="0" width="1440" height="64"/>
    <text class="text h1" x="88" y="40">AODS — Dashboard</text>
    <circle cx="1392" cy="32" r="12" fill="#86b6ff" />
    <circle cx="1356" cy="32" r="12" fill="#2a2f3a" />
    <circle cx="1320" cy="32" r="12" fill="#2a2f3a" />
  </g>
  <!-- Nav drawer -->
  <g>
    <rect class="surface outline" x="0" y="64" width="240" height="960"/>
    <text class="muted h2" x="24" y="104">NAVIGATION</text>
    <g>
      <rect x="8" y="120" width="224" height="40" rx="8" fill="#1f2a3a"/>
      <text class="text body" x="24" y="145">Dashboard</text>
    </g>
    <g>
      <rect x="8" y="168" width="224" height="40" rx="8" fill="transparent" class="outline"/>
      <text class="muted body" x="24" y="193">Scans</text>
    </g>
    <g>
      <rect x="8" y="216" width="224" height="40" rx="8" fill="transparent" class="outline"/>
      <text class="muted body" x="24" y="241">Results</text>
    </g>
    <g>
      <rect x="8" y="264" width="224" height="40" rx="8" fill="transparent" class="outline"/>
      <text class="muted body" x="24" y="289">Reports</text>
    </g>
  </g>
  <!-- Content -->
  <g>
    <rect class="surface outline" x="256" y="88" width="1152" height="240" rx="16"/>
    <text class="muted h2" x="280" y="116">Key Metrics</text>
    <!-- KPI cards -->
    <g>
      <rect class="card outline" x="280" y="136" width="256" height="168" rx="14"/>
      <text class="muted body" x="300" y="164">Open Findings</text>
      <text class="text h1" x="300" y="200">128</text>
      <rect x="300" y="212" width="200" height="6" rx="3" fill="#1f2a3a"/>
      <rect x="300" y="212" width="120" height="6" rx="3" class="accent"/>
    </g>
    <g>
      <rect class="card outline" x="552" y="136" width="256" height="168" rx="14"/>
      <text class="muted body" x="572" y="164">Critical/High</text>
      <text class="text h1" x="572" y="200">34</text>
      <rect x="572" y="212" width="200" height="6" rx="3" fill="#1f2a3a"/>
      <rect x="572" y="212" width="80" height="6" rx="3" class="accent"/>
    </g>
    <g>
      <rect class="card outline" x="824" y="136" width="256" height="168" rx="14"/>
      <text class="muted body" x="844" y="164">MTTR (days)</text>
      <text class="text h1" x="844" y="200">6.2</text>
      <rect x="844" y="212" width="200" height="6" rx="3" fill="#1f2a3a"/>
      <rect x="844" y="212" width="140" height="6" rx="3" class="accent"/>
    </g>
    <g>
      <rect class="card outline" x="1096" y="136" width="256" height="168" rx="14"/>
      <text class="muted body" x="1116" y="164">Scans Running</text>
      <text class="text h1" x="1116" y="200">3</text>
      <rect x="1116" y="212" width="200" height="6" rx="3" fill="#1f2a3a"/>
      <rect x="1116" y="212" width="60" height="6" rx="3" class="accent"/>
    </g>
  </g>
  <!-- Lower content -->
  <g>
    <rect class="surface outline" x="256" y="352" width="560" height="304" rx="16"/>
    <text class="muted h2" x="280" y="380">Risk Overview</text>
    <rect x="280" y="400" width="512" height="240" rx="12" fill="#0d1117" stroke="#22262f"/>
    <text class="muted body" x="296" y="432">[Chart placeholder]</text>
  </g>
  <g>
    <rect class="surface outline" x="832" y="352" width="576" height="304" rx="16"/>
    <text class="muted h2" x="856" y="380">Queue Status</text>
    <g>
      <rect x="856" y="400" width="536" height="40" rx="10" fill="#0f1116" stroke="#22262f"/>
      <text class="text body" x="872" y="425">Scan 24A — Running — ETA 12m</text>
    </g>
    <g>
      <rect x="856" y="448" width="536" height="40" rx="10" fill="#0f1116" stroke="#22262f"/>
      <text class="muted body" x="872" y="473">Scan 24B — Queued</text>
    </g>
    <g>
      <rect x="856" y="496" width="536" height="40" rx="10" fill="#0f1116" stroke="#22262f"/>
      <text class="muted body" x="872" y="521">Scan 24C — Preparing</text>
    </g>
  </g>
  <!-- CTA -->
  <g>
    <rect x="256" y="676" width="200" height="44" rx="22" class="accent"/>
    <text class="bg h2" x="296" y="705">New Scan</text>
    <rect x="472" y="676" width="200" height="44" rx="22" fill="#2a2f3a"/>
    <text class="text h2" x="520" y="705">Schedule</text>
  </g>
</svg>