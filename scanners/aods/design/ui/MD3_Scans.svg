<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
  <defs>
    <style>
      .bg { fill: #0b0c0f; }
      .surface { fill: #111318; }
      .outline { stroke: #1a1d24; stroke-width: 1; }
      .text { fill: #e3e6eb; font-family: 'Inter', 'Roboto', Arial, sans-serif; }
      .muted { fill: #aeb4bf; font-family: 'Inter', 'Roboto', Arial, sans-serif; }
      .accent { fill: #86b6ff; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="1024"/>
  <!-- App bar and drawer -->
  <g>
    <rect class="surface outline" x="0" y="0" width="1440" height="64"/>
    <text class="text" x="88" y="40" font-size="18" font-weight="600">AODS — Scans</text>
  </g>
  <g>
    <rect class="surface outline" x="0" y="64" width="240" height="960"/>
    <text class="muted" x="24" y="104" font-size="14" font-weight="600">NAVIGATION</text>
  </g>
  <!-- Filters -->
  <g>
    <rect class="surface outline" x="256" y="88" width="1152" height="72" rx="16"/>
    <rect x="276" y="108" width="220" height="36" rx="8" fill="#0f1116" stroke="#22262f"/>
    <text class="muted" x="288" y="132" font-size="12">Search scans…</text>
    <rect x="508" y="108" width="96" height="36" rx="18" fill="#1f2a3a"/>
    <text class="text" x="536" y="132" font-size="12">All</text>
    <rect x="612" y="108" width="120" height="36" rx="18" fill="#2a2f3a"/>
    <text class="muted" x="640" y="132" font-size="12">Running</text>
    <rect x="740" y="108" width="120" height="36" rx="18" fill="#2a2f3a"/>
    <text class="muted" x="772" y="132" font-size="12">Queued</text>
  </g>
  <!-- Table -->
  <g>
    <rect class="surface outline" x="256" y="176" width="1152" height="768" rx="16"/>
    <g>
      <rect x="256" y="176" width="1152" height="48" fill="#0f1116" stroke="#22262f"/>
      <text class="muted" x="280" y="206" font-size="12">Scan ID</text>
      <text class="muted" x="420" y="206" font-size="12">Target</text>
      <text class="muted" x="740" y="206" font-size="12">Profile</text>
      <text class="muted" x="900" y="206" font-size="12">Status</text>
      <text class="muted" x="1040" y="206" font-size="12">Findings</text>
    </g>
    <!-- Row 1 -->
    <g>
      <rect x="256" y="224" width="1152" height="56" fill="#0b0d12" stroke="#22262f"/>
      <text class="text" x="280" y="258" font-size="12">24A</text>
      <text class="text" x="420" y="258" font-size="12">https://app.example.com</text>
      <text class="muted" x="740" y="258" font-size="12">Full OWASP</text>
      <rect x="894" y="236" width="72" height="28" rx="14" fill="#1f2a3a"/>
      <text class="text" x="906" y="255" font-size="12">Running</text>
      <text class="text" x="1040" y="258" font-size="12">42</text>
    </g>
    <!-- Row 2 -->
    <g>
      <rect x="256" y="280" width="1152" height="56" fill="#0f1116" stroke="#22262f"/>
      <text class="text" x="280" y="314" font-size="12">24B</text>
      <text class="text" x="420" y="314" font-size="12">https://api.example.com</text>
      <text class="muted" x="740" y="314" font-size="12">Quick Scan</text>
      <rect x="894" y="292" width="72" height="28" rx="14" fill="#2a2f3a"/>
      <text class="muted" x="908" y="311" font-size="12">Queued</text>
      <text class="text" x="1040" y="314" font-size="12">0</text>
    </g>
  </g>
</svg>