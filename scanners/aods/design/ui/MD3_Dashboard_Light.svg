<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
  <title>AODS — Dashboard (Light Theme, MD3)</title>
  <desc>Light theme variant of the AODS Dashboard screen following MD3: app bar, navigation rail, and content cards.</desc>
  <defs>
    <linearGradient id="cardGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafbfc"/>
    </linearGradient>
    <filter id="elev1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0b1a37" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1440" height="1024" fill="#f6f7fb"/>

  <!-- App Bar -->
  <g>
    <rect x="0" y="0" width="1440" height="64" fill="#ffffff"/>
    <line x1="0" y1="64" x2="1440" y2="64" stroke="#e6e9ef"/>
    <circle cx="36" cy="32" r="12" fill="#1b5fff"/>
    <text x="60" y="38" font-family="Inter, Roboto, Arial, sans-serif" font-size="18" fill="#0f172a" font-weight="600">AODS</text>
    <text x="118" y="38" font-family="Inter, Roboto, Arial, sans-serif" font-size="16" fill="#475569">Dashboard</text>
    <rect x="1248" y="16" rx="10" ry="10" width="80" height="32" fill="#1b5fff"/>
    <text x="1268" y="36" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="600">New scan</text>
    <circle cx="1360" cy="32" r="14" fill="#eef2ff" stroke="#c7d2fe"/>
    <circle cx="1400" cy="32" r="14" fill="#eef2ff" stroke="#c7d2fe"/>
  </g>

  <!-- Navigation Rail -->
  <g>
    <rect x="0" y="64" width="88" height="960" fill="#f2f4f8"/>
    <line x1="88" y1="64" x2="88" y2="1024" stroke="#e6e9ef"/>
    <!-- icons -->
    <rect x="24" y="96" width="40" height="40" rx="10" fill="#1b5fff" opacity="0.12"/>
    <rect x="24" y="152" width="40" height="40" rx="10" fill="#1b5fff" opacity="0.0" stroke="#cbd5e1"/>
    <rect x="24" y="208" width="40" height="40" rx="10" fill="#1b5fff" opacity="0.0" stroke="#cbd5e1"/>
    <rect x="24" y="264" width="40" height="40" rx="10" fill="#1b5fff" opacity="0.0" stroke="#cbd5e1"/>
  </g>

  <!-- Content Area -->
  <g transform="translate(112, 88)">
    <!-- Row 1 KPI cards -->
    <g>
      <rect x="0" y="0" width="312" height="120" rx="16" fill="url(#cardGrad)" filter="url(#elev1)"/>
      <text x="20" y="36" font-family="Inter, Roboto, Arial" font-size="12" fill="#64748b">Total scans</text>
      <text x="20" y="80" font-family="Inter, Roboto, Arial" font-size="32" fill="#0f172a" font-weight="700">128</text>

      <rect x="336" y="0" width="312" height="120" rx="16" fill="url(#cardGrad)" filter="url(#elev1)"/>
      <text x="356" y="36" font-family="Inter, Roboto, Arial" font-size="12" fill="#64748b">Open vulns</text>
      <text x="356" y="80" font-family="Inter, Roboto, Arial" font-size="32" fill="#ef4444" font-weight="700">47</text>

      <rect x="672" y="0" width="312" height="120" rx="16" fill="url(#cardGrad)" filter="url(#elev1)"/>
      <text x="692" y="36" font-family="Inter, Roboto, Arial" font-size="12" fill="#64748b">MTTR (days)</text>
      <text x="692" y="80" font-family="Inter, Roboto, Arial" font-size="32" fill="#0f172a" font-weight="700">5.4</text>

      <rect x="1008" y="0" width="312" height="120" rx="16" fill="url(#cardGrad)" filter="url(#elev1)"/>
      <text x="1028" y="36" font-family="Inter, Roboto, Arial" font-size="12" fill="#64748b">SLA breach</text>
      <text x="1028" y="80" font-family="Inter, Roboto, Arial" font-size="32" fill="#f97316" font-weight="700">3</text>
    </g>

    <!-- Row 2 chart + table preview cards -->
    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="656" height="320" rx="16" fill="#ffffff" stroke="#e6e9ef"/>
      <text x="20" y="36" font-family="Inter, Roboto, Arial" font-size="13" fill="#0f172a" font-weight="600">Findings trend (30d)</text>
      <!-- simple chart lines -->
      <polyline points="20,260 120,200 220,220 320,160 420,180 520,120 620,140" fill="none" stroke="#60a5fa" stroke-width="2"/>
      <polyline points="20,260 120,220 220,200 320,200 420,160 520,160 620,120" fill="none" stroke="#ef4444" stroke-width="2"/>

      <g transform="translate(680,0)">
        <rect x="0" y="0" width="640" height="320" rx="16" fill="#ffffff" stroke="#e6e9ef"/>
        <text x="20" y="36" font-family="Inter, Roboto, Arial" font-size="13" fill="#0f172a" font-weight="600">Latest scans</text>
        <!-- table rows -->
        <g transform="translate(20,56)">
          <rect x="0" y="0" width="600" height="40" rx="10" fill="#f8fafc"/>
          <text x="12" y="26" font-family="Inter, Roboto, Arial" font-size="12" fill="#0f172a">app-prod | OWASP Full</text>
          <rect x="480" y="10" rx="8" ry="8" width="80" height="20" fill="#dcfce7"/>
          <text x="500" y="25" font-family="Inter, Roboto, Arial" font-size="11" fill="#166534">PASS</text>
        </g>
        <g transform="translate(20,104)">
          <rect x="0" y="0" width="600" height="40" rx="10" fill="#ffffff" stroke="#eef2f7"/>
          <text x="12" y="26" font-family="Inter, Roboto, Arial" font-size="12" fill="#0f172a">api-staging | Delta</text>
          <rect x="480" y="10" rx="8" ry="8" width="80" height="20" fill="#fee2e2"/>
          <text x="497" y="25" font-family="Inter, Roboto, Arial" font-size="11" fill="#991b1b">FAIL</text>
        </g>
        <g transform="translate(20,152)">
          <rect x="0" y="0" width="600" height="40" rx="10" fill="#ffffff" stroke="#eef2f7"/>
          <text x="12" y="26" font-family="Inter, Roboto, Arial" font-size="12" fill="#0f172a">web-dev | OWASP Full</text>
          <rect x="480" y="10" rx="8" ry="8" width="80" height="20" fill="#ffedd5"/>
          <text x="502" y="25" font-family="Inter, Roboto, Arial" font-size="11" fill="#9a3412">RUNNING</text>
        </g>
      </g>
    </g>
  </g>
</svg>