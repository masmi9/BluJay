<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
  <title>AODS — Settings (Dark, MD3)</title>
  <desc>Dark theme Settings screen with app bar, navigation drawer, and Organization/Integrations sections.</desc>
  <!-- Background -->
  <rect width="1440" height="1024" fill="#0b0c0f" />
  <!-- App bar -->
  <g>
    <rect x="0" y="0" width="1440" height="64" fill="#111318"/>
    <text x="60" y="38" font-family="Inter, Roboto, Arial" font-size="18" fill="#e3e6eb" font-weight="700">AODS</text>
    <text x="120" y="38" font-family="Inter, Roboto, Arial" font-size="16" fill="#aeb4bf">Settings</text>
    <rect x="1248" y="16" rx="10" ry="10" width="96" height="32" fill="#1e3a8a"/>
    <text x="1266" y="36" font-family="Inter, Roboto, Arial" font-size="12" fill="#fff" font-weight="600">Save changes</text>
  </g>
  <!-- Nav drawer -->
  <g>
    <rect x="0" y="64" width="264" height="960" fill="#0f1116"/>
    <line x1="264" y1="64" x2="264" y2="1024" stroke="#1a1d24"/>
    <text x="24" y="112" font-family="Inter, Roboto, Arial" font-size="12" fill="#aeb4bf">NAVIGATION</text>
    <rect x="16" y="128" width="232" height="40" rx="10" fill="#141821"/>
    <text x="32" y="154" font-family="Inter, Roboto, Arial" font-size="13" fill="#e3e6eb">Dashboard</text>
    <rect x="16" y="176" width="232" height="40" rx="10" fill="#141821"/>
    <text x="32" y="202" font-family="Inter, Roboto, Arial" font-size="13" fill="#e3e6eb">Scans</text>
    <rect x="16" y="224" width="232" height="40" rx="10" fill="#1e3a8a"/>
    <text x="32" y="250" font-family="Inter, Roboto, Arial" font-size="13" fill="#ffffff" font-weight="600">Settings</text>
  </g>
  <!-- Content -->
  <g transform="translate(296,96)">
    <text x="0" y="0" font-family="Inter, Roboto, Arial" font-size="20" fill="#e3e6eb" font-weight="700">Settings</text>
    <!-- Organization -->
    <g transform="translate(0,28)">
      <rect x="0" y="16" width="784" height="176" rx="16" fill="#111318" stroke="#1a1d24"/>
      <text x="20" y="44" font-family="Inter, Roboto, Arial" font-size="14" fill="#aeb4bf">Organization</text>
      <text x="20" y="80" font-family="Inter, Roboto, Arial" font-size="12" fill="#c7ccd6">Organization name</text>
      <rect x="20" y="92" width="440" height="36" rx="10" fill="#0f1116" stroke="#22262f"/>
      <text x="32" y="115" font-family="Inter, Roboto, Arial" font-size="12" fill="#e3e6eb">Acme Security</text>
      <rect x="680" y="28" width="72" height="28" rx="8" fill="#141821"/>
      <text x="694" y="47" font-family="Inter, Roboto, Arial" font-size="11" fill="#c1c7d0">Edit</text>
    </g>
    <!-- Integrations -->
    <g transform="translate(0,228)">
      <rect x="0" y="16" width="784" height="248" rx="16" fill="#111318" stroke="#1a1d24"/>
      <text x="20" y="44" font-family="Inter, Roboto, Arial" font-size="14" fill="#aeb4bf">Integrations</text>
      <text x="20" y="80" font-family="Inter, Roboto, Arial" font-size="12" fill="#c7ccd6">Jira Base URL</text>
      <rect x="20" y="92" width="560" height="36" rx="10" fill="#0f1116" stroke="#22262f"/>
      <text x="32" y="115" font-family="Inter, Roboto, Arial" font-size="12" fill="#e3e6eb">https://jira.example.com</text>
      <rect x="596" y="92" width="168" height="36" rx="10" fill="#1e3a8a"/>
      <text x="626" y="115" font-family="Inter, Roboto, Arial" font-size="12" fill="#ffffff" font-weight="600">Test connection</text>
      <text x="20" y="160" font-family="Inter, Roboto, Arial" font-size="12" fill="#c7ccd6">Webhook secret</text>
      <rect x="20" y="172" width="560" height="36" rx="10" fill="#0f1116" stroke="#22262f"/>
      <text x="32" y="195" font-family="Inter, Roboto, Arial" font-size="12" fill="#aeb4bf">••••••••••••</text>
    </g>
  </g>
</svg>