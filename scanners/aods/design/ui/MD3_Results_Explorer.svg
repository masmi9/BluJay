<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
  <defs>
    <style>
      .bg { fill: #0b0c0f; }
      .surface { fill: #111318; }
      .outline { stroke: #1a1d24; stroke-width: 1; }
      .text { fill: #e3e6eb; font-family: 'Inter', 'Roboto', Arial, sans-serif; }
      .muted { fill: #aeb4bf; font-family: 'Inter', 'Roboto', Arial, sans-serif; }
      .accent { fill: #86b6ff; }
      .sev-hi { fill: #ff6b6b; }
      .sev-med { fill: #f7b267; }
      .sev-low { fill: #7bd389; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="1024"/>
  <!-- App bar and drawer -->
  <g>
    <rect class="surface outline" x="0" y="0" width="1440" height="64"/>
    <text class="text" x="88" y="40" font-size="18" font-weight="600">AODS — Results Explorer</text>
  </g>
  <g>
    <rect class="surface outline" x="0" y="64" width="240" height="960"/>
    <text class="muted" x="24" y="104" font-size="14" font-weight="600">NAVIGATION</text>
  </g>
  <!-- Filters left -->
  <g>
    <rect class="surface outline" x="256" y="88" width="280" height="864" rx="16"/>
    <text class="muted" x="280" y="116" font-size="14" font-weight="600">Filters</text>
    <text class="muted" x="280" y="148" font-size="12">Severity</text>
    <g>
      <rect x="280" y="160" width="96" height="28" rx="14" class="sev-hi"/>
      <text class="bg" x="312" y="179" font-size="12">High</text>
      <rect x="380" y="160" width="96" height="28" rx="14" class="sev-med"/>
      <text class="bg" x="408" y="179" font-size="12">Medium</text>
      <rect x="280" y="196" width="96" height="28" rx="14" class="sev-low"/>
      <text class="bg" x="308" y="215" font-size="12">Low</text>
    </g>
    <text class="muted" x="280" y="252" font-size="12">Source</text>
    <g>
      <rect x="280" y="264" width="232" height="32" rx="8" fill="#0f1116" stroke="#22262f"/>
      <text class="muted" x="292" y="285" font-size="12">All sources</text>
    </g>
  </g>
  <!-- Results list -->
  <g>
    <rect class="surface outline" x="552" y="88" width="856" height="864" rx="16"/>
    <g>
      <rect x="560" y="100" width="320" height="36" rx="8" fill="#0f1116" stroke="#22262f"/>
      <text class="muted" x="572" y="124" font-size="12">Search results…</text>
    </g>
    <g>
      <rect x="560" y="152" width="824" height="56" fill="#0f1116" stroke="#22262f"/>
      <circle cx="584" cy="180" r="8" class="sev-hi"/>
      <text class="text" x="604" y="184" font-size="12">Hardcoded credentials in config file</text>
      <text class="muted" x="1080" y="184" font-size="12">Confidence: 0.91</text>
    </g>
    <g>
      <rect x="560" y="208" width="824" height="56" fill="#0b0d12" stroke="#22262f"/>
      <circle cx="584" cy="236" r="8" class="sev-med"/>
      <text class="text" x="604" y="240" font-size="12">Missing content security policy (CSP)</text>
      <text class="muted" x="1080" y="240" font-size="12">Confidence: 0.77</text>
    </g>
    <g>
      <rect x="560" y="264" width="824" height="56" fill="#0f1116" stroke="#22262f"/>
      <circle cx="584" cy="292" r="8" class="sev-low"/>
      <text class="text" x="604" y="296" font-size="12">Server version disclosure</text>
      <text class="muted" x="1080" y="296" font-size="12">Confidence: 0.63</text>
    </g>
  </g>
</svg>