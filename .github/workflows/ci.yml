name: BluJay CI
on: [push, pull_request]
jobs:
  run-blujay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install BluJay
        run: pip install .
      - name: Run Static Analysis
        run: blujay scan --input ./examples --lang python --output blu_output.csv
